    drawReplayWriteBuffer(write.x, write.y, write.w, write.h, lane, c);
    drawReplayVisibility(visibility.x, visibility.y, visibility.w, visibility.h, lane, c);
  }

  function drawNeutralPanelBox(x, y, w, h, title, c, radius = 9, active = false) {
    ctx.fillStyle = active ? alpha(c.panel3, .88) : alpha(c.panel2, .78);
    ctx.strokeStyle = active ? c.border : c.borderSoft;
    ctx.lineWidth = active ? 1.4 : 1;
    roundRect(x, y, w, h, radius, true, true);
    if (!title) return;
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.subTitle, 900);
    ctx.textAlign = 'left';
    fitText(title, x + PANEL_TITLE_X, y + PANEL_TITLE_Y, w - PANEL_TITLE_X * 2, 'left');
  }

  function drawReplayWriteBuffer(x, y, w, h, lane, c) {
    const writeActive = state.detailFocus === 'writeBuffer' || lane.highlight === 'active' || lane.highlight === 'immutable';
    drawNeutralPanelBox(x, y, w, h, 'write buffer', c, 9, writeActive);
    const st = currentStep();
    const p = stepProgress(true);
    const layout = replayWriteBufferLayout(x, y, w, h);
    const { activePanel, queue, activeMem } = layout;
    const prevRows = lane.prevActiveRows ?? lane.activeRows;
    const displayRows = lerp(prevRows, lane.activeRows, p);
    const fillH = layout.fullFill.h * clamp(displayRows / lane.activeCap, 0, 1);

    drawNeutralPanelBox(activePanel.x, activePanel.y, activePanel.w, activePanel.h, '', c, 6, lane.highlight === 'active');
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    ctx.fillText('active', activePanel.x + 8, activePanel.y + 18);

    ctx.fillStyle = alpha(flow.replay, .34);
    roundRect(layout.fullFill.x, layout.fullFill.y + layout.fullFill.h - fillH, layout.fullFill.w, Math.max(5, fillH), 5, true, false);
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'center';
    ctx.fillText(`${Math.round(displayRows)}/${lane.activeCap}`, activeMem.x + activeMem.w / 2, activeMem.y + activeMem.h - 14);

    const sealMoving = st.anim === 'seal' && p < 1;
    const flushMoving = st.anim === 'flush' && p < 1 && lane.prevImmutable > 0;
    const visibleImmutable = sealMoving || flushMoving ? lane.prevImmutable : lane.immutable;
    const queueCount = flushMoving ? 0 : visibleImmutable;
    drawCompactImmQueue(layout, queueCount, lane.highlight === 'immutable', c, { suppressEmpty: sealMoving || flushMoving });

    if (st.anim === 'seal' && p < 1) {
      const targetX = firstImmutableMemX(layout, lane.prevImmutable + 1);
      const ghostX = lerp(layout.fullFill.x, targetX, p);
      ctx.save();
      ctx.globalAlpha = Math.min(1, p * 3) * .85;
      ctx.fillStyle = alpha(flow.gc, .26);
      ctx.strokeStyle = alpha(flow.gc, .62);
      roundRect(ghostX, layout.fullFill.y, layout.fullFill.w, layout.fullFill.h, 6, true, true);
      ctx.restore();
    }

  }

  function firstImmutableMemX(layout, count) {
    const { queue, memW, itemGap } = layout;
    const n = Math.max(1, Math.min(count, 3));
    const totalW = memW * n + itemGap * (n - 1);
    return queue.x + Math.max(9, (queue.w - totalW) / 2);
  }

  function drawCompactImmQueue(layout, count, active, c, opts = {}) {
    const { queue, memW, memY, memH, itemGap } = layout;
    const color = flow.gc;
    drawNeutralPanelBox(queue.x, queue.y, queue.w, queue.h, '', c, 6, active);
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    ctx.fillText('immut queue', queue.x + 8, queue.y + 18);
    const n = Math.min(count, 3);
    if (count <= 0) {
      if (opts.suppressEmpty) return;
      ctx.fillStyle = c.muted;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'center';
      ctx.fillText('empty', queue.x + queue.w / 2, queue.y + queue.h / 2 + 6);
      return;
    }
    const startX = firstImmutableMemX(layout, count);
    for (let i = 0; i < n; i++) {
      const bx = startX + i * (memW + itemGap);
      const label = count > 3 && i === n - 1 ? `+${count - 2}` : `b${count - i}`;
      ctx.fillStyle = alpha(color, active ? .22 : .12);
      ctx.strokeStyle = alpha(color, active ? .56 : .28);
      roundRect(bx, memY, memW, memH, 5, true, true);
      ctx.fillStyle = c.text;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'center';
      fitText(label, bx + 3, memY + memH / 2 + 5, memW - 6, 'center');
    }
  }

  function drawAsyncFlushMemtable(c) {
    const st = currentStep();
    if (st.anim !== 'flush') return;
    const p = stepProgress(true);
    if (p >= 1) return;
    const lane = activeReplayLane();
    if ((lane.prevImmutable || 0) <= 0) return;
    const { write } = replayerPanelLayout();
    const layout = replayWriteBufferLayout(write.x, write.y, write.w, write.h);
    const startX = firstImmutableMemX(layout, lane.prevImmutable);
    const start = { x: startX + layout.memW / 2, y: layout.memY + layout.memH / 2 };
    const end = point('storage.memtable');
    const x = lerp(start.x, end.x, p);
    const y = lerp(start.y, end.y, p);

    ctx.save();
    ctx.fillStyle = alpha(flow.storage, .22);
    ctx.strokeStyle = alpha(flow.storage, .62);
    ctx.lineWidth = 1.4;
    roundRect(x - layout.memW / 2, y - layout.memH / 2, layout.memW, layout.memH, 5, true, true);
    ctx.restore();
  }

  function drawReplayVisibility(x, y, w, h, lane, c) {
    const appendSettled = currentStep().anim === 'appendDeleteTs' && stepProgress() >= .82;
    const visibilityActive = state.detailFocus === 'visibility' || state.detailFocus === 'gc' ||
      (lane.highlight === 'visibility' && !appendSettled) || lane.highlight === 'baseBitmap' || lane.highlight === 'foldEligible';
    drawNeutralPanelBox(x, y, w, h, 'visibility structure', c, 9, visibilityActive);

    const layout = replayVisibilityLayout(x, y, w, h);
    const { rowX, rowY, labelW, bitmapX, bitmapW, chainY, chainH } = layout;

    drawBaseTsLabel(lane, rowX, rowY + 14, labelW - 4, c);
    drawFixedDeleteBitmap(lane, bitmapX, rowY, bitmapW, c);

    const chainX = x + MODULE_CONTENT_PAD;
    const chainW = w - MODULE_CONTENT_PAD * 2;
    const chainPad = 8;
    const itemPad = 20;
    ctx.fillStyle = visibilityActive ? alpha(flow.visibility, .10) : alpha(c.panel2, .78);
    ctx.strokeStyle = visibilityActive ? alpha(flow.visibility, .48) : c.borderSoft;
    ctx.lineWidth = visibilityActive ? 1.4 : 1;
    roundRect(chainX, chainY, chainW, chainH, 7, true, true);
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    ctx.fillText('delete ts chain', chainX + chainPad, chainY + 22);
    const itemsY = chainY + 34;
    drawCompactDeleteTsItems(chainX + itemPad, itemsY, chainW - itemPad * 2, lane, c);
    drawFoldingDeleteTsItems(chainX + itemPad, itemsY, chainW - itemPad * 2, bitmapX, rowY, bitmapW, lane, c);
    drawDeleteTsConditionPill(chainX + itemPad, itemsY + 32, chainW - itemPad * 2, lane, c);
  }

  function drawBaseTsLabel(lane, x, y, w, c) {
    const foldActive = currentStep().anim === 'foldDeleteTs';
    const p = stepProgress();
    const showUpdatedBaseTs = !foldActive || p >= .72;
    const labelTs = showUpdatedBaseTs ? lane.baseTs : lane.prevBaseTs;
    ctx.save();
    ctx.fillStyle = foldActive && showUpdatedBaseTs ? flow.gc : c.text;
    ctx.font = typeFont(TYPE.text, foldActive ? 900 : 900);
    ctx.textAlign = 'left';
    if (foldActive && showUpdatedBaseTs) ctx.globalAlpha *= lerp(.72, 1, ease(clamp((p - .72) / .18, 0, 1)));
    fitText(`baseTs=${labelTs}`, x, y, w, 'left');
    ctx.restore();
  }

  function drawDeleteTsConditionPill(x, y, w, lane, c) {
    if (lane.highlight !== 'foldEligible') return;
    const p = stepProgress();
    if (p < .12) return;
    const a = ease(clamp((p - .12) / .28, 0, 1));
    const out = 1 - ease(clamp((p - .62) / .10, 0, 1));
    if (out <= 0) return;
    const pillW = Math.min(118, Math.max(86, w * .44));
    const pillH = 24;
    ctx.save();
    ctx.globalAlpha *= a * out;
    drawPill(x + (w - pillW) / 2, y, pillW, pillH, 'ts <= safeTs', flow.visibility, c, true, 8);
    ctx.restore();
  }

  function drawFixedDeleteBitmap(lane, x, y, w, c) {
    const len = 16;
    const foldActive = currentStep().anim === 'foldDeleteTs';
    const foldP = stepProgress();
    const showFoldedBits = !foldActive || foldP >= .72;
    const bits = ((showFoldedBits ? lane.baseBitmap : lane.prevBaseBitmap) || '').padEnd(len, '0').slice(0, len);
    const pendingDeletes = new Set();
    const eligibleDeletes = new Set();
    const newlyFolded = new Set();

    lane.deleteTs.forEach(item => {
      const offset = deleteOffsetValue(item);
      if (!Number.isFinite(offset) || offset < 0 || offset >= len) return;
      pendingDeletes.add(offset);
      if (lane.safeTs != null && deleteTsValue(item) <= lane.safeTs) {
        eligibleDeletes.add(offset);
      }
    });
    if (foldActive) {
      (lane.prevDeleteTs || []).forEach(item => {
        const offset = foldBitmapOffsetValue(item, lane);
        if (Number.isFinite(offset) && offset >= 0 && offset < len && lane.safeTs != null && deleteTsValue(item) <= lane.safeTs) {
          newlyFolded.add(offset);
        }
      });
    }

    for (let i = 0; i < len; i++) {
      const folded = bits[i] === '1';
      const eligible = eligibleDeletes.has(i);
      const pending = pendingDeletes.has(i);
      const justFolded = newlyFolded.has(i);
      let fill = alpha(c.border, .22);
      let stroke = alpha(c.border, .56);

      if (folded) {
        const color = justFolded ? flow.gc : flow.delete;
        const foldedAlpha = justFolded ? lerp(.28, .72, ease(clamp((foldP - .72) / .18, 0, 1))) : .62;
        fill = justFolded ? alpha(color, foldedAlpha) : alpha(flow.delete, .46);
        stroke = justFolded ? alpha(color, .88) : alpha(flow.delete, .70);
      } else if (eligible) {
        fill = alpha(flow.gc, .50);
        stroke = alpha(flow.gc, .76);
      } else if (pending) {
        fill = alpha(flow.delete, .46);
        stroke = alpha(flow.delete, .70);
      }

      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = folded || pending ? (justFolded ? 1.8 : 1.2) : 1;
      const cell = bitmapCellRect(x, y, w, i);
      roundRect(cell.x, cell.y, cell.w, cell.h, 2.5, true, true);
    }
  }

  function bitmapCellMetrics(x, w, len = 16) {
    const gap = 3;
    const cellW = Math.max(7, Math.min(12, Math.floor((w - gap * (len - 1)) / len)));
    const cellH = 18;
    const totalW = len * cellW + (len - 1) * gap;
    const startX = x + Math.max(0, (w - totalW) / 2);
    return { gap, cellW, cellH, startX };
  }

  function bitmapCellRect(x, y, w, index) {
    const m = bitmapCellMetrics(x, w);
    return { x: m.startX + index * (m.cellW + m.gap), y, w: m.cellW, h: m.cellH };
  }

  function drawCompactDeleteTsItems(x, y, w, lane, c) {
    const columns = 4;
    const rows = 2;
    const st = currentStep();
    const hideAppendingItem = st.anim === 'appendDeleteTs' && stepProgress() < .82;
    const appendSettled = st.anim === 'appendDeleteTs' && stepProgress() >= .82;
    const foldingDeleteTs = st.anim === 'foldDeleteTs' && stepProgress() < .82;
    const items = foldingDeleteTs ? (lane.prevDeleteTs || lane.deleteTs) : hideAppendingItem ? lane.deleteTs.slice(0, -1) : lane.deleteTs;
    const visible = items.slice(0, columns * rows);
    const itemW = Math.min(72, Math.floor((w - 18 * (columns - 1)) / columns));
    const gapX = columns > 1 ? (w - itemW * columns) / (columns - 1) : 0;
    const itemH = 24;
    const rowGap = 10;
    visible.forEach((item, i) => {
      const col = i % columns;
      const row = Math.floor(i / columns);
      const ts = deleteTsValue(item);
      const eligible = lane.safeTs != null && ts <= lane.safeTs;
      const gcActive = foldEligibleHighlightReady() && lane.highlight === 'foldEligible' && eligible;
      const foldingEligible = foldingDeleteTs && eligible;
      if (foldingEligible) return;
      const appendVisible = st.anim !== 'appendDeleteTs' || !hideAppendingItem;
      const active = gcActive || foldingEligible || (lane.highlight === 'visibility' && appendVisible && !appendSettled && i === visible.length - 1);
      const color = gcActive || foldingEligible ? flow.gc : active || st.anim === 'appendDeleteTs' ? flow.delete : c.border;
      drawPill(x + col * (itemW + gapX), y + row * (itemH + rowGap), itemW, itemH, item, color, c, active, 8);
    });
    if (hideAppendingItem) {
      drawAppendingDeleteTsItem(x, y, itemW, itemH, gapX, rowGap, columns, rows, lane, c);
    }
    if (items.length > columns * rows) {
      ctx.fillStyle = c.muted;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'right';
      ctx.fillText(`+${items.length - columns * rows}`, x + w, y + rows * itemH + rowGap);
    }
  }

  function foldEligibleHighlightReady() {
    if (currentStep().anim === 'foldDeleteTs') return true;
    if (activeReplayLane().highlight !== 'foldEligible') return true;
    return stepProgress() >= .72;
  }

  function drawFoldingDeleteTsItems(chainX, chainY, chainW, bitmapX, bitmapY, bitmapW, lane, c) {
    if (currentStep().anim !== 'foldDeleteTs') return;
    const p = stepProgress();
    if (p >= .82) return;
    const t = ease(clamp((p - .08) / .70, 0, 1));
    const layout = deleteTsItemLayout(chainW);
    const items = (lane.prevDeleteTs || []).slice(0, layout.columns * layout.rows);
    items.forEach((item, i) => {
      if (lane.safeTs == null || deleteTsValue(item) > lane.safeTs) return;
      const offset = foldBitmapOffsetValue(item, lane);
      if (!Number.isFinite(offset)) return;
      const start = deleteTsItemCenter(chainX, chainY, layout, i);
      const target = bitmapCellCenter(bitmapX, bitmapY, bitmapW, offset);
      const cx = lerp(start.x, target.x, t);
      const cy = lerp(start.y, target.y, t);
      const alphaOut = 1 - ease(clamp((p - .54) / .28, 0, 1));

      ctx.save();
      ctx.globalAlpha *= alphaOut;
      ctx.translate(cx, cy);
      ctx.scale(lerp(1, .82, t), lerp(1, .82, t));
      drawPill(-layout.itemW / 2, -layout.itemH / 2, layout.itemW, layout.itemH, item, flow.gc, c, true, 8);
      ctx.restore();
    });
  }

  function deleteTsItemLayout(w) {
    const columns = 4;
    const rows = 2;
    const itemW = Math.min(72, Math.floor((w - 18 * (columns - 1)) / columns));
    const gapX = columns > 1 ? (w - itemW * columns) / (columns - 1) : 0;
    const itemH = 24;
    const rowGap = 10;
    return { columns, rows, itemW, gapX, itemH, rowGap };
  }

  function deleteTsItemCenter(x, y, layout, index) {
    const col = index % layout.columns;
    const row = Math.floor(index / layout.columns);
    return {
      x: x + col * (layout.itemW + layout.gapX) + layout.itemW / 2,
      y: y + row * (layout.itemH + layout.rowGap) + layout.itemH / 2
    };
  }

  function bitmapCellCenter(x, y, w, index) {
    const cell = bitmapCellRect(x, y, w, index);
    return { x: cell.x + cell.w / 2, y: cell.y + cell.h / 2 };
  }

  function drawAppendingDeleteTsItem(x, y, itemW, itemH, gapX, rowGap, columns, rows, lane, c) {
    const p = stepProgress();
    if (p < .10) return;
    const item = lane.deleteTs[lane.deleteTs.length - 1];
    if (!item) return;
    const t = ease(clamp((p - .10) / (.82 - .10), 0, 1));
    const finalIndex = Math.min(lane.deleteTs.length - 1, columns * rows - 1);
    const col = finalIndex % columns;
    const row = Math.floor(finalIndex / columns);
    const finalX = x + col * (itemW + gapX);
    const finalY = y + row * (itemH + rowGap);
    const finalCenter = { x: finalX + itemW / 2, y: finalY + itemH / 2 };
    const start = point('lane1.visibility');
    const cx = lerp(start.x, finalCenter.x, t);
    const cy = lerp(start.y, finalCenter.y, t);
    const scale = lerp(1.75, 1, t);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    drawPill(-itemW / 2, -itemH / 2, itemW, itemH, item, flow.delete, c, true, 8);
    ctx.restore();
  }

  function foldDeleteTsIntoBaseBitmap(lane, safeTs) {
    const len = 16;
    const bits = (lane.baseBitmap || '').padEnd(len, '0').slice(0, len).split('');
    const remaining = [];
    lane.deleteTs.forEach(item => {
      const ts = deleteTsValue(item);
      const offset = foldBitmapOffsetValue(item, lane);
      if (ts <= safeTs) {
        if (Number.isFinite(offset) && offset >= 0 && offset < len) bits[offset] = '1';
      } else {
        remaining.push(item);
      }
    });
    lane.safeTs = safeTs;
    lane.baseTs = safeTs;
    lane.baseBitmap = bits.join('');
    lane.deleteTs = remaining;
    lane.highlight = 'baseBitmap';
  }

  function foldBitmapOffsetValue(item, lane) {
    if (lane && lane.id === DETAIL_REPLAY_ID && deleteTsValue(item) <= DEFAULT_GC_SAFE_TS) {
      return GC_FOLD_TARGET_OFFSET;
    }
    return deleteOffsetValue(item);
  }

  function deleteOffsetValue(item) {
    const m = /\((\d+),/.exec(item);
    return m ? Number(m[1]) : Number.NaN;
  }

  function deleteTsValue(item) {
    const m = /,(\d+)\)/.exec(item);
    return m ? Number(m[1]) : Number.POSITIVE_INFINITY;
  }

  function drawStorage(c) {
    const r = rects.storage;
    drawComponent(r, c, { color: flow.storage, key: 'storage' });
    const layout = storagePanelsLayout(r);
    drawFlushedMemtablePanel(layout.memtable.x, layout.memtable.y, layout.memtable.w, layout.memtable.h, {
      title: 'blocks',
      color: flow.storage,
      labels: storageObjectLabelsForDraw().slice(0, STORAGE_ITEM_CAPACITY),
      hotLabel: model.storage.flushedHot
    }, c);
    drawStoragePanel(layout.files.x, layout.files.y, layout.files.w, layout.files.h, {
      ...layout.files,
      title: 'files',
      color: flow.replay,
      kind: 'FILE',
      labels: regularStorageFileLabelsForDraw(),
      active: ['query', 'storageGc'].includes(state.detailFocus) || ['compactObjectsToFile', 'validRatioCheck', 'compactRegularFiles'].includes(currentStep().anim),
      regular: true,
      maxItems: STORAGE_ITEM_CAPACITY
    }, c);
    drawStorageCompactionFileOverlay(c);
    drawRegularFileCompactionOverlay(c);
  }

  function storageObjectLabels() {
    return [...model.storage.objectEntries];
  }

  function storageObjectLabelsForDraw() {
    if (currentStep().anim === 'compactObjectsToFile') {
      const previous = model.storage.prevObjectEntries || [];
      if (previous.length) return [...previous];
    }
    return storageObjectLabels();
  }

  function drawStorageCompactionFileOverlay(c) {
    if (currentStep().anim !== 'compactObjectsToFile') return;
    const p = stepProgress();
    if (p >= .70) return;

    const fileLabel = model.storage.compactionFile || 'file-2.pxl';
    const previousObjects = model.storage.prevObjectEntries || [];
    if (!previousObjects.length) return;

    const layout = storagePanelsLayout(rects.storage);
    const objectLayout = flushedMemtableObjectLayout(layout.memtable, previousObjects);
    const objectCenters = objectLayout.visibleLabels.map((_, i) => ({
      x: objectLayout.xForIndex(i) + objectLayout.objW / 2,
      y: objectLayout.objY + objectLayout.objH / 2
    }));
    const start = averagePoints(objectCenters);

    const fileLabels = regularStorageFileLabels();
    const fileLayout = flushedMemtableObjectLayout(layout.files, fileLabels, STORAGE_ITEM_CAPACITY, 'left');
    let fileIndex = fileLayout.visibleLabels.indexOf(fileLabel);
    if (fileIndex < 0) fileIndex = Math.max(0, fileLayout.visibleLabels.length - 1);
    const end = {
      x: fileLayout.xForIndex(fileIndex) + fileLayout.objW / 2,
      y: fileLayout.objY + fileLayout.objH / 2
    };

    const move = ease(clamp((p - .06) / .50, 0, 1));
    const fadeIn = clamp(p / .12, 0, 1);
    const fadeOut = p > .58 ? 1 - clamp((p - .58) / .12, 0, 1) : 1;
    const x = lerp(start.x, end.x, move);
    const y = lerp(start.y, end.y, move);

    ctx.save();
    ctx.globalAlpha *= fadeIn * fadeOut;
    drawCompactStorageFileIcon(
      x - fileLayout.objW / 2,
      y - fileLayout.objH / 2,
      fileLayout.objW,
      fileLayout.objH,
      displayStorageFileLabel(fileLabel),
      flow.storage,
      c,
      true
    );
    ctx.restore();
  }

  function drawRegularFileCompactionOverlay(c) {
    if (currentStep().anim !== 'compactRegularFiles') return;
    const p = stepProgress();
    const fileLabel = model.storage.compactionFile || 'file-2.pxl';
    const previousFiles = model.storage.prevRegularFiles || [];
    if (!previousFiles.length) return;

    const layout = storagePanelsLayout(rects.storage);
    const oldLayout = flushedMemtableObjectLayout(layout.files, previousFiles, STORAGE_ITEM_CAPACITY, 'left');
    const oldCenters = oldLayout.visibleLabels.map((_, i) => ({
      x: oldLayout.xForIndex(i) + oldLayout.objW / 2,
      y: oldLayout.objY + oldLayout.objH / 2
    }));
    const start = averagePoints(oldCenters);

    const finalLabels = [...previousFiles, fileLabel];
    const finalLayout = flushedMemtableObjectLayout(layout.files, finalLabels, STORAGE_ITEM_CAPACITY, 'left');
    const finalIndex = Math.min(previousFiles.length, finalLayout.visibleLabels.length - 1);
    const end = {
      x: finalLayout.xForIndex(finalIndex) + finalLayout.objW / 2,
      y: finalLayout.objY + finalLayout.objH / 2
    };

    const t = ease(clamp((p - .06) / .50, 0, 1));
    const fadeIn = ease(clamp(p / .14, 0, 1));
    const x = lerp(start.x, end.x, t);
    const y = lerp(start.y, end.y, t);

    ctx.save();
    ctx.globalAlpha *= fadeIn;
    drawCompactStorageFileIcon(
      x - finalLayout.objW / 2,
      y - finalLayout.objH / 2,
      finalLayout.objW,
      finalLayout.objH,
      displayStorageFileLabel(fileLabel),
      flow.storage,
      c,
      true
    );
    ctx.restore();
  }

  function averagePoints(points) {
    if (!points.length) return { x: 0, y: 0 };
    const sum = points.reduce((acc, p) => ({ x: acc.x + p.x, y: acc.y + p.y }), { x: 0, y: 0 });
    return { x: sum.x / points.length, y: sum.y / points.length };
  }

  function storagePanelsLayout(r) {
    const x = r.x + STORAGE_EDGE_PAD;
    const y = r.y + MODULE_TITLE_Y + MODULE_CONTENT_GAP;
    const w = r.w - STORAGE_EDGE_PAD * 2;
    const gap = STORAGE_PANEL_GAP;
    const memH = STORAGE_COMPACT_PANEL_H;
    const filesH = STORAGE_COMPACT_PANEL_H;
    return {
      memtable: { x, y, w, h: memH },
      files: { x, y: y + memH + gap, w, h: filesH }
    };
  }

  function flushedMemtableObjectCenter(panel) {
    const layout = flushedMemtableObjectLayout(panel, flushedMemtableAnchorLabels());
    if (!layout.visibleLabels.length) {
      return [layout.rightX + layout.objW / 2, layout.objY + layout.objH / 2];
    }
    return [layout.xForIndex(0) + layout.objW / 2, layout.objY + layout.objH / 2];
  }

  function flushedMemtableAnchorLabels() {
    const labels = [...model.storage.objectEntries];
    const pending = model.storage.pendingFlushObject;
    if (pending && !labels.includes(pending)) labels.unshift(pending);
    return labels.slice(0, STORAGE_ITEM_CAPACITY);
  }

  function flushedMemtableObjectLayout(panel, labels, maxItems = STORAGE_ITEM_CAPACITY, align = 'right') {
    const metrics = retinaMemtableMetrics();
    const objW = STORAGE_COMPACT_ITEM_W;
    const objY = panel.y + STORAGE_PANEL_TITLE_Y + STORAGE_TITLE_ITEM_GAP;
    const objH = Math.min(metrics.h, Math.max(36, panel.h - (objY - panel.y) - STORAGE_ITEM_BOTTOM_PAD));
    const edgePad = STORAGE_EDGE_PAD;
    const gap = STORAGE_COMPACT_ITEM_GAP;
    const innerW = Math.max(objW, panel.w - edgePad * 2);
    const maxFit = Math.max(1, Math.floor((innerW + gap) / (objW + gap)));
    const visibleLabels = labels.slice(0, Math.min(maxItems, maxFit));
    const leftX = panel.x + edgePad;
    const rightX = panel.x + panel.w - edgePad - objW;
    return {
      objW,
      objH,
      objY,
      gap,
      visibleLabels,
      leftX,
      rightX,
      xForIndex: i => align === 'left'
        ? leftX + i * (objW + gap)
        : rightX - (visibleLabels.length - 1 - i) * (objW + gap)
    };
  }

  function regularStorageFileLabels() {
    const files = [];
    if (model.storage.agingQueue.length) files.push(...model.storage.agingQueue);
    files.push(...model.storage.regularFiles);
    if (model.storage.newFile && model.storage.newFile !== 'none') files.push(model.storage.newFile);
    return [...new Set(files)];
  }

  function regularStorageFileLabelsForDraw() {
    if (currentStep().anim === 'compactRegularFiles') {
      return [...(model.storage.prevRegularFiles || [])];
    }
    return regularStorageFileLabels();
  }

  function drawStoragePanel(x, y, w, h, panel, c) {
    ctx.fillStyle = panel.active ? alpha(c.panel3, .88) : alpha(c.panel2, .78);
    ctx.strokeStyle = panel.active ? c.border : c.borderSoft;
    ctx.lineWidth = panel.active ? 1.4 : 1;
    roundRect(x, y, w, h, 10, true, true);
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    fitText(panel.title, x + STORAGE_PANEL_TITLE_X, y + STORAGE_PANEL_TITLE_Y, w - STORAGE_PANEL_TITLE_X * 2, 'left');
    const labels = panel.labels.length ? panel.labels : ['empty'];
    if (panel.regular) {
      drawCompactRegularFiles({ x, y, w, h }, panel, labels, c);
      return;
    }
    const maxItems = panel.maxItems || 4;
    const visibleLabels = labels.slice(0, maxItems);
    const iconGap = 9;
    const iconY = y + 48;
    const iconH = Math.max(58, h - 66);
    const maxIconW = panel.regular ? 150 : 112;
    const iconW = Math.min(maxIconW, (w - 24 - iconGap * (visibleLabels.length - 1)) / visibleLabels.length);
    const totalIconW = iconW * visibleLabels.length + iconGap * (visibleLabels.length - 1);
    const startX = x + Math.max(12, (w - totalIconW) / 2);
    visibleLabels.forEach((label, i) => {
      const oldFile = panel.regular && model.storage.agingQueue.includes(String(label));
      const retired = oldFile && /RETIRED|cleanupAt|physically/.test(model.storage.cleanup);
      const candidate = oldFile && !retired;
      const newFile = panel.regular && String(label) === model.storage.newFile;
      const temporary = newFile && model.storage.newFileState === 'TEMPORARY_GC';
      const iconKind = retired ? 'RETIRED' : temporary ? 'TEMP' : candidate ? 'CAND' : panel.kind;
      const iconX = startX + i * (iconW + iconGap);
      drawTabularStorageIcon(iconX, iconY, iconW, iconH, String(label), iconKind, panel.color, c, {
        active: panel.active || String(label) === panel.hotLabel,
        candidate,
        retired,
        newFile,
        temporary
      });
    });
  }

  function drawCompactRegularFiles(bounds, panel, labels, c) {
    if (labels.length === 1 && labels[0] === 'empty') {
      ctx.fillStyle = c.muted;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'center';
      ctx.fillText('empty', bounds.x + bounds.w / 2, bounds.y + bounds.h / 2 + 6);
      return;
    }

    const layout = flushedMemtableObjectLayout(bounds, labels, panel.maxItems || 5, 'left');
    layout.visibleLabels.forEach((label, i) => {
      const labelText = String(label);
      const oldFile = model.storage.agingQueue.includes(labelText);
      const retired = oldFile && /RETIRED|cleanupAt|physically/.test(model.storage.cleanup);
      const candidate = oldFile && !retired;
      const newFile = labelText === model.storage.newFile;
      const compactedFile = isCompactionFile(labelText);
      const regularCompactionFile = isRegularCompactionFile(labelText);
      const compactingOldFile = isCompactingOldRegularFile(labelText);
      const fileAlpha = compactedFile ? compactionFileSettledAlpha() : regularCompactionFile ? regularCompactionFileSettledAlpha() : compactingOldFile ? regularCompactionOldFileAlpha() : 1;
      if (fileAlpha <= 0) return;
      const temporary = newFile && model.storage.newFileState === 'TEMPORARY_GC';
      const ratioCandidate = isValidRatioCandidateFile(labelText);
      const color = compactingOldFile ? flow.delete : retired ? flow.delete : candidate || temporary || ratioCandidate ? flow.gc : newFile || compactedFile || regularCompactionFile ? flow.storage : panel.color;
      const active = panel.active || candidate || retired || newFile || temporary || compactedFile || regularCompactionFile || compactingOldFile || ratioCandidate;
      const fileX = layout.xForIndex(i);
      ctx.save();
      ctx.globalAlpha *= fileAlpha;
      drawCompactStorageFileIcon(fileX, layout.objY, layout.objW, layout.objH, displayStorageFileLabel(labelText), color, c, active);
      ctx.restore();
    });
    drawValidRatioConditionPill(bounds, layout, c);
  }

  function isCompactionFile(label) {
    return currentStep().anim === 'compactObjectsToFile' && label === model.storage.compactionFile;
  }

  function isRegularCompactionFile(label) {
    return currentStep().anim === 'compactRegularFiles' && label === model.storage.compactionFile;
  }

  function isCompactingOldRegularFile(label) {
    return currentStep().anim === 'compactRegularFiles' && (model.storage.prevRegularFiles || []).includes(label);
  }

  function isValidRatioCandidateFile(label) {
    return currentStep().anim === 'validRatioCheck' &&
      stepProgress() >= .58 &&
      (model.storage.regularFiles || []).includes(label);
  }

  function compactionFileSettledAlpha() {
    const p = stepProgress();
    if (p < .58) return 0;
    return ease(clamp((p - .58) / .22, 0, 1));
  }

  function regularCompactionFileSettledAlpha() {
    const p = stepProgress();
    if (p < .58) return 0;
    return ease(clamp((p - .58) / .24, 0, 1));
  }

  function regularCompactionOldFileAlpha() {
    const p = stepProgress();
    return 1 - ease(clamp((p - .52) / .34, 0, 1));
  }

  function drawValidRatioConditionPill(bounds, layout, c) {
    if (currentStep().anim !== 'validRatioCheck') return;
    const p = stepProgress();
    if (p < .12) return;
    const fadeIn = ease(clamp((p - .12) / .28, 0, 1));
    const fadeOut = 1 - ease(clamp((p - .48) / .10, 0, 1));
    if (fadeOut <= 0) return;
    const lastIndex = Math.max(0, layout.visibleLabels.length - 1);
    const lastFileRight = layout.xForIndex(lastIndex) + layout.objW;
    const blankRight = bounds.x + bounds.w;
    const blankW = Math.max(0, blankRight - lastFileRight);
    const sideGap = 4;
    const availableW = Math.max(0, blankW - sideGap * 2);
    const pillW = availableW >= 110 ? Math.min(140, availableW) : availableW;
    const pillH = 24;
    const x = lastFileRight + (blankW - pillW) / 2;
    const y = layout.objY + layout.objH / 2 - pillH / 2;
    ctx.save();
    ctx.globalAlpha *= fadeIn * fadeOut;
    drawPill(x, y, pillW, pillH, 'valid ratio <= 0.5', flow.gc, c, true, 8);
    ctx.restore();
  }

  function displayStorageFileLabel(label) {
    return String(label).replace(/\.pxl$/, '');
  }

  function drawCompactStorageFileIcon(x, y, w, h, label, color, c, active) {
    ctx.fillStyle = alpha(color, active ? .24 : .13);
    ctx.strokeStyle = alpha(color, active ? .62 : .30);
    ctx.lineWidth = active ? 1.5 : 1;
    roundRect(x, y, w, h, 5, true, true);

    ctx.fillStyle = alpha(color, active ? .38 : .22);
    roundRect(x + 6, y + 7, w - 12, 6, 3, true, false);
    ctx.strokeStyle = alpha(color, active ? .40 : .24);
    ctx.lineWidth = 1;
    const rowTop = y + 22;
    const rowGap = Math.max(8, Math.floor((h - 42) / 2));
    for (let i = 0; i < 3; i++) {
      const yy = rowTop + i * rowGap;
      if (yy > y + h - 20) break;
      ctx.beginPath();
      ctx.moveTo(x + 8, yy);
      ctx.lineTo(x + w - 8, yy);
      ctx.stroke();
    }

    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'center';
    fitText(label, x + 3, y + h - 9, w - 6, 'center');
  }

  function drawFlushedMemtablePanel(x, y, w, h, panel, c) {
    ctx.fillStyle = alpha(c.panel2, .78);
    ctx.strokeStyle = c.borderSoft;
    ctx.lineWidth = 1;
    roundRect(x, y, w, h, 10, true, true);
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    fitText(panel.title, x + STORAGE_PANEL_TITLE_X, y + STORAGE_PANEL_TITLE_Y, w - STORAGE_PANEL_TITLE_X * 2, 'left');

    const labels = panel.labels.length ? panel.labels : [];
    if (!labels.length) {
      ctx.fillStyle = c.muted;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'center';
      ctx.fillText('empty', x + w / 2, y + h / 2 + 6);
      return;
    }

    const layout = flushedMemtableObjectLayout({ x, y, w, h }, labels);

    layout.visibleLabels.forEach((label, i) => {
      const objX = layout.xForIndex(i);
      const style = storageObjectIconStyle(String(label), panel);
      if (style.alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha *= style.alpha;
      ctx.fillStyle = alpha(style.color, style.active ? .24 : .13);
      ctx.strokeStyle = alpha(style.color, style.active ? .62 : .30);
      ctx.lineWidth = style.active ? 1.5 : 1;
      roundRect(objX, layout.objY, layout.objW, layout.objH, 5, true, true);
      ctx.fillStyle = c.text;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'center';
      fitText(displayStorageObjectLabel(label), objX + 3, layout.objY + layout.objH / 2 + 5, layout.objW - 6, 'center');
      if (style.deleting) drawStorageObjectDeleteMark(objX, layout.objY, layout.objW, layout.objH);
      ctx.restore();
    });
  }

  function storageObjectIconStyle(label, panel) {
    const deleting = currentStep().anim === 'compactObjectsToFile' &&
      (model.storage.prevObjectEntries || []).includes(label) &&
      stepProgress() >= .50;
    if (!deleting) {
      return {
        color: panel.color,
        alpha: 1,
        active: String(label) === String(panel.hotLabel || ''),
        deleting: false
      };
    }
    const fade = ease(clamp((stepProgress() - .50) / .46, 0, 1));
    return {
      color: flow.delete,
      alpha: lerp(1, 0, fade),
      active: true,
      deleting: true
    };
  }

  function drawStorageObjectDeleteMark(x, y, w, h) {
    ctx.strokeStyle = alpha(flow.delete, .82);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 10, y + 10);
    ctx.lineTo(x + w - 10, y + h - 10);
    ctx.moveTo(x + w - 10, y + 10);
    ctx.lineTo(x + 10, y + h - 10);
    ctx.stroke();
  }

  function displayStorageObjectLabel(label) {
    return String(label).replace(/obj-(\d+)$/i, (_, n) => `obj-${n.slice(-1)}`);
  }

  function drawTabularStorageIcon(x, y, w, h, label, kind, color, c, opts = {}) {
    const iconColor = opts.retired ? flow.delete : opts.candidate || opts.temporary ? flow.gc : opts.newFile ? flow.storage : color;
    const emphasized = opts.active || opts.candidate || opts.retired || opts.newFile || opts.temporary;
    ctx.fillStyle = alpha(iconColor, emphasized ? .20 : .10);
    ctx.strokeStyle = alpha(iconColor, emphasized ? .62 : .30);
    ctx.lineWidth = emphasized ? 1.5 : 1;
    roundRect(x, y, w, h, 7, true, true);
    ctx.fillStyle = alpha(iconColor, .22);
    roundRect(x + 6, y + 8, w - 12, 7, 3, true, false);
    ctx.strokeStyle = alpha(iconColor, .24);
    ctx.lineWidth = 1;
    const rowTop = y + 26;
    const rowBottom = y + h - 24;
    const rowCount = 4;
    for (let i = 0; i < rowCount; i++) {
      const yy = rowTop + i * ((rowBottom - rowTop) / Math.max(1, rowCount - 1));
      ctx.beginPath();
      ctx.moveTo(x + 8, yy);
      ctx.lineTo(x + w - 8, yy);
      ctx.stroke();
    }
    ctx.fillStyle = iconColor;
    ctx.font = typeFont(TYPE.text, 900);
    ctx.textAlign = 'left';
    ctx.fillText(kind, x + 8, y + 29);
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    fitText(label, x + 8, y + h - 10, w - 16, 'left');
  }

  function queryLayout(r, splits) {
    const x = r.x + 18;
    const w = r.w - 36;
    const list = splits && splits.length ? splits : [{}, {}, {}];
    const scheduler = { x, y: r.y + 116, w, h: 80 };
    const splitH = 94;
    const splitGap = 20;
    const gateH = 150;
    const queueH = 78;
    const opsH = 88;
    const bottom = r.y + r.h - 22;
    const fixedH = scheduler.h + list.length * splitH + Math.max(0, list.length - 1) * splitGap + gateH + queueH + opsH;
    const spare = Math.max(120, bottom - scheduler.y - fixedH);
    const schedulerSplitGap = Math.round(spare * .18);
    const splitGateGap = Math.round(spare * .34);
    const gateQueueGap = Math.round(spare * .18);
    const queueOpsGap = spare - schedulerSplitGap - splitGateGap - gateQueueGap;
    const portGap = list.length > 1 ? Math.min(82, (w - 96) / (list.length - 1)) : 0;
    const splitY = scheduler.y + scheduler.h + schedulerSplitGap;
    const splitBoxes = list.map((split, i) => ({
      x,
      y: splitY + i * (splitH + splitGap),
      w,
      h: splitH,
      split,
      portX: x + 48 + i * portGap
    }));
    const lastSplit = splitBoxes[splitBoxes.length - 1];
    const gateBox = { x, y: lastSplit.y + lastSplit.h + splitGateGap, w, h: gateH };
    const queueBox = { x, y: gateBox.y + gateBox.h + gateQueueGap, w, h: queueH };
    const opsBox = { x, y: queueBox.y + queueBox.h + queueOpsGap, w, h: opsH };
    return { x, w, scheduler, splitBoxes, gateBox, queueBox, opsBox };
  }

  function drawQuery(c) {
    const r = rects.query;
    const q = model.query;
    const splits = q.splits || [];
    const gate = q.gate || {};
    const { x, w, scheduler, splitBoxes, gateBox, queueBox, opsBox } = queryLayout(r, splits);
    drawBoundary(r, c, 'query');

    drawPill(x, r.y + 64, 86, 30, q.id, flow.query, c, q.active, 11);
    drawPill(x + 96, r.y + 64, w - 96, 30, `transTs=${q.transTs}`, flow.tx, c, q.active, 11);

    splitBoxes.forEach(box => {
      drawQueryInternalLink([
        [scheduler.x + scheduler.w / 2, scheduler.y + scheduler.h],
        [box.portX, scheduler.y + scheduler.h + 12],
        [box.portX, box.y]
      ], querySplitColor(box.split.kind), c, .28);
      drawQueryInternalLink([
        [box.portX, box.y + box.h],
        [box.portX, gateBox.y - 12],
        [gateBox.x + gateBox.w / 2, gateBox.y]
      ], querySplitColor(box.split.kind), c, .24);
    });
    drawQueryInternalLink([[gateBox.x + gateBox.w / 2, gateBox.y + gateBox.h], [queueBox.x + queueBox.w / 2, queueBox.y]], flow.visibility, c, .34);
    drawQueryInternalLink([[queueBox.x + queueBox.w / 2, queueBox.y + queueBox.h], [opsBox.x + opsBox.w / 2, opsBox.y]], flow.query, c, .34);

    smallBox(scheduler.x, scheduler.y, scheduler.w, scheduler.h, 'Split Scheduler', flow.query, c, state.detailFocus === 'query');
    drawPill(scheduler.x + 12, scheduler.y + 32, scheduler.w - 24, 28, q.parallelism || 'parallel split execution', flow.query, c, q.active, 10);
    drawSchedulerGlyph(scheduler.x + scheduler.w - 42, scheduler.y + 21, flow.query, c);

    splitBoxes.forEach((box, i) => drawQuerySplitCard(box, c, i));
    drawVisibilityGateBox(gateBox, gate, c);
    drawVisibleQueueBox(queueBox, q, c);
    drawOperatorPipelineBox(opsBox, q, c);
  }

  function querySplitColor(kind) {
    if (kind === 'active') return flow.replay;
    if (kind === 'flushed') return flow.storage;
    return flow.query;
  }

  function drawQueryInternalLink(points, color, c, opacity) {
    const pts = points.map(arrPoint);
    ctx.save();
    ctx.strokeStyle = alpha(color, opacity);
    ctx.lineWidth = 1.6;
    ctx.lineCap = 'round';
    ctx.setLineDash([5, 6]);
    drawPolyline(pts);
    ctx.setLineDash([]);
    arrowHead(pts[pts.length - 2], pts[pts.length - 1], alpha(color, opacity + .18));
    ctx.restore();
  }

  function drawSchedulerGlyph(cx, cy, color, c) {
    ctx.save();
    ctx.fillStyle = alpha(color, .20);
    ctx.strokeStyle = alpha(color, .55);
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    for (let i = 0; i < 3; i++) {
      const y = cy + 18 + i * 6;
      ctx.strokeStyle = alpha(color, .42);
      ctx.beginPath(); ctx.moveTo(cx - 18, y); ctx.lineTo(cx + 18, y); ctx.stroke();
      ctx.fillStyle = i === 1 ? color : alpha(c.text, .55);
      ctx.beginPath(); ctx.arc(cx - 18 + i * 18, y, 2.4, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  function drawQuerySplitCard(box, c, index) {
    const split = box.split;
    const color = querySplitColor(split.kind);
    const active = split.status !== 'waiting' || state.detailFocus === 'query' || state.activeChannels.includes('flush');
    ctx.fillStyle = active ? alpha(color, c.dark ? .16 : .10) : alpha(c.panel2, .80);
    ctx.strokeStyle = active ? alpha(color, .58) : c.borderSoft;
    ctx.lineWidth = active ? 1.5 : 1;
    roundRect(box.x, box.y, box.w, box.h, 9, true, true);
    drawQuerySplitIcon(split.kind, box.x + 12, box.y + 16, color, c);
    ctx.fillStyle = color;
    ctx.font = typeFont(TYPE.subTitle, 900);
    ctx.textAlign = 'left';
    fitText(`${split.id} · ${split.title}`, box.x + 52, box.y + 25, box.w - 122, 'left');
    ctx.fillStyle = c.muted;
    ctx.font = typeFont(TYPE.text, 0);
    fitText(split.source, box.x + 52, box.y + 46, box.w - 122, 'left');
    drawPill(box.x + box.w - 76, box.y + 14, 64, 26, split.status, color, c, active, 9);
    drawProgressBar(box.x + 52, box.y + 60, box.w - 122, 8, split.progress || 0, color, c);
    drawBatchDots(box.x + box.w - 62, box.y + 58, Math.max(split.batches || 0, split.visible || 0), color, c);
    ctx.fillStyle = alpha(c.muted, .72);
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'center';
    ctx.fillText(`task ${index + 1}`, box.x + 25, box.y + box.h - 10);
  }

  function drawQuerySplitIcon(kind, x, y, color, c) {
    ctx.save();
    ctx.strokeStyle = alpha(color, .55);
    ctx.fillStyle = alpha(color, .18);
    ctx.lineWidth = 1;
    if (kind === 'regular') {
      for (let i = 0; i < 3; i++) roundRect(x + i * 5, y + i * 4, 24, 20, 4, true, true);
      ctx.fillStyle = color;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'center';
      ctx.fillText('RG', x + 17, y + 17);
    } else if (kind === 'active') {
      roundRect(x, y, 34, 28, 5, true, true);
      ctx.strokeStyle = alpha(color, .42);
      for (let i = 1; i < 3; i++) { ctx.beginPath(); ctx.moveTo(x + i * 11, y + 4); ctx.lineTo(x + i * 11, y + 24); ctx.stroke(); }
      for (let i = 1; i < 2; i++) { ctx.beginPath(); ctx.moveTo(x + 4, y + i * 14); ctx.lineTo(x + 30, y + i * 14); ctx.stroke(); }
    } else {
      roundRect(x + 2, y + 4, 30, 22, 6, true, true);
      ctx.fillStyle = alpha(color, .28);
      roundRect(x + 7, y, 20, 8, 4, true, false);
      ctx.fillStyle = color;
      ctx.font = typeFont(TYPE.text, 900);
      ctx.textAlign = 'center';
      ctx.fillText('OBJ', x + 17, y + 20);
    }
    ctx.restore();
  }

  function drawProgressBar(x, y, w, h, progress, color, c) {
    const p = clamp(progress, 0, 1);
    ctx.fillStyle = alpha(c.border, .38);
    roundRect(x, y, w, h, h / 2, true, false);
    ctx.fillStyle = alpha(color, .72);
    roundRect(x, y, Math.max(h, w * p), h, h / 2, true, false);
  }

  function drawBatchDots(x, y, count, color, c) {
    const n = Math.max(3, Math.min(5, count || 0));
    for (let i = 0; i < n; i++) {
      const filled = i < (count || 0);
      ctx.fillStyle = filled ? alpha(color, .62) : alpha(c.border, .42);
      roundRect(x + i * 9, y, 7, 10, 2, true, false);
    }
  }

  function drawVisibilityGateBox(box, gate, c) {
    smallBox(box.x, box.y, box.w, box.h, 'VFoR Visibility Gate', flow.visibility, c, state.detailFocus === 'visibility');
    const fx = box.x + 18, fy = box.y + 34;
    ctx.fillStyle = alpha(flow.visibility, c.dark ? .22 : .14);
    ctx.strokeStyle = alpha(flow.visibility, .58);
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx + 60, fy);
    ctx.lineTo(fx + 42, fy + 36);
    ctx.lineTo(fx + 42, fy + 50);
    ctx.lineTo(fx + 18, fy + 50);
    ctx.lineTo(fx + 18, fy + 36);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    drawBits(gate.bitmap || '0010100110', box.x + 92, box.y + 36, c, flow.visibility);
    drawPill(box.x + 88, box.y + 62, box.w - 104, 28, gate.rule || 'visibility rule', flow.visibility, c, true, 9);
    metricRows(box.x + 88, box.y + 91, box.w - 104, [
      ['input', `${gate.inputBatches || 0} batches`],
      ['output', `${gate.visibleBatches || 0} visible`]
    ], c);
  }

  function drawVisibleQueueBox(box, q, c) {
    smallBox(box.x, box.y, box.w, box.h, 'Visible Batch Queue', flow.query, c, state.detailFocus === 'query');
    drawBatchDots(box.x + 14, box.y + 34, q.gate ? q.gate.visibleBatches : 0, flow.query, c);
    drawPill(box.x + 72, box.y + 33, box.w - 86, 28, q.queueState || 'waiting', flow.query, c, (q.gate && q.gate.visibleBatches > 0), 10);
  }

  function drawOperatorPipelineBox(box, q, c) {
    smallBox(box.x, box.y, box.w, box.h, 'Downstream Operators', flow.query, c, state.detailFocus === 'query');
    const labels = ['Scan', 'Filter', 'Project', 'Agg'];
    const bw = 62;
    labels.forEach((label, i) => {
      const bx = box.x + 12 + i * 68;
      drawPill(bx, box.y + 34, bw, 28, label, flow.query, c, q.returnedRows > 0 || i === 0, 9);
    });
    ctx.fillStyle = c.muted;
    ctx.font = typeFont(TYPE.text, 0);
    ctx.textAlign = 'left';
    fitText(`${q.operatorInput} · rows ${q.returnedRows.toLocaleString()}`, box.x + 12, box.y + 76, box.w - 24, 'left');
  }

  function drawTokens(c) {
    const st = currentStep();
    const p = stepProgress();
    st.tokens.forEach(t => {
      if (st.anim === 'appendDeleteTs' && (t.path || []).includes('lane1.deleteArray')) return;
      if (p < t.start || p > t.end) return;
      const local = ease((p - t.start) / (t.end - t.start));
      const pt = pathPoint(t.path.map(point), local);
      drawToken(pt.x, pt.y, t.label, t.color, c);
    });
  }

  function drawToken(x, y, label, color, c) {
    ctx.save();
    label = displaySinkText(label);
    ctx.font = typeFont(TYPE.text, 900);
    const textW = Math.min(180, Math.max(54, ctx.measureText(label).width + 28));
    ctx.shadowColor = alpha(color, .22);
    ctx.shadowBlur = 10;
    ctx.fillStyle = color;
    roundRect(x - textW / 2, y - 18, textW, 36, 18, true, false);
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = alpha('#ffffff', .86);
    ctx.lineWidth = 1;
    roundRect(x - textW / 2, y - 18, textW, 36, 18, false, true);
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    fitText(label, x - textW / 2 + 10, y + 1, textW - 20, 'center');
    ctx.restore();
  }

  function displaySinkText(text) {
    let value = String(text || '');
    value = value.replace(/\btx\d+\s*\+\s*tx\d+\s*\+\s*tx\d+\b/gi, 'mirror batch');
    value = value.replace(/\b(\d+)\s+tx\s+rows\b/gi, '$1 rows');
    value = value.replace(/\b(\d+)\s+mirror tx\b/gi, '$1 mirror transactions');
    value = value.replace(/\bmirror tx\b/gi, 'mirror transaction');
    value = value.replace(/\b(txn:)?tx\d+\s*/gi, '');
    value = value.replace(/\bTXN\b\s*/g, '');
    value = value.replace(/\s*\+\s*/g, ' + ');
    value = value.replace(/^\s*\+\s*|\s*\+\s*$/g, '');
    value = value.replace(/\s{2,}/g, ' ').trim();
    return value || 'mirror transaction';
  }

  function drawCommitWait(c) {
    const st = currentStep();
    if (st.anim !== 'waitCommit') return;
    const layout = pixelsSinkLayout(rects.ingress);
    const commit = layout.byId.commit;
    const cx = commit.x + commit.w - 28;
    const cy = commit.y + commit.h - 32;
    const size = 18;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(streamCycleProgress() * Math.PI * 2);
    ctx.strokeStyle = flow.gc;
    ctx.fillStyle = alpha(flow.gc, c.dark ? .18 : .10);
    ctx.lineWidth = 2;
    roundRect(-size / 2, -size / 2, size, size, 5, true, true);
    ctx.beginPath();
    ctx.moveTo(-6, -6);
    ctx.lineTo(6, -6);
    ctx.lineTo(-6, 6);
    ctx.lineTo(6, 6);
    ctx.stroke();
    ctx.restore();
  }

  function drawComponent(r, c, opts) {
    const highlighted = isHighlighted(opts.key);
    ctx.save();
    ctx.fillStyle = highlighted ? alpha(opts.color, c.dark ? .16 : .10) : alpha(c.elevated, .94);
    ctx.strokeStyle = highlighted ? alpha(opts.color, .62) : c.borderSoft;
    ctx.lineWidth = highlighted ? 1.8 : 1;
    if (highlighted) shadow(c);
    roundRect(r.x, r.y, r.w, r.h, 12, true, true);
    ctx.shadowColor = 'transparent';
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.moduleTitle, 900);
    ctx.textAlign = 'left';
    fitText(r.title, r.x + MODULE_TITLE_X, r.y + MODULE_TITLE_Y, r.w - MODULE_TITLE_X * 2, 'left');
    ctx.restore();
  }

  function drawGroup(r, c, color, key) {
    const highlighted = isHighlighted(key);
    ctx.fillStyle = highlighted ? alpha(color, c.dark ? .12 : .08) : alpha(color, c.dark ? .05 : .035);
    ctx.strokeStyle = highlighted ? alpha(color, .58) : alpha(color, .24);
    ctx.lineWidth = highlighted ? 1.7 : 1;
    roundRect(r.x, r.y, r.w, r.h, 14, true, true);
  }

  function smallBox(x, y, w, h, title, color, c, active) {
    ctx.fillStyle = active ? alpha(color, c.dark ? .18 : .11) : alpha(c.panel2, .78);
    ctx.strokeStyle = active ? alpha(color, .62) : c.borderSoft;
    ctx.lineWidth = active ? 1.5 : 1;
    roundRect(x, y, w, h, 9, true, true);
    ctx.fillStyle = color;
    ctx.font = typeFont(TYPE.subTitle, 900);
    ctx.textAlign = 'left';
    fitText(title, x + PANEL_TITLE_X, y + PANEL_TITLE_Y, w - PANEL_TITLE_X * 2, 'left');
  }

  function drawMiniStack(x, y, w, rows, c) {
    rows.forEach((row, i) => {
      const yy = y + i * 40;
      ctx.fillStyle = alpha(row[2], c.dark ? .13 : .08);
      ctx.strokeStyle = alpha(row[2], .28);
      roundRect(x, yy, w, 32, 8, true, true);
      ctx.fillStyle = row[2];
      ctx.font = typeFont(TYPE.subTitle, 900);
      ctx.textAlign = 'left';
      ctx.fillText(row[0], x + 10, yy + 17);
      ctx.fillStyle = c.text;
      ctx.font = typeFont(TYPE.text, 0);
      fitText(row[1], x + 10, yy + 32, w - 20, 'left');
    });
  }

  function metricRows(x, y, w, rows, c) {
    rows.forEach((row, i) => {
      const yy = y + i * 22;
      ctx.fillStyle = c.muted;
      ctx.font = typeFont(TYPE.text, 0);
      ctx.textAlign = 'left';
      fitText(row[0], x, yy, w * .42, 'left');
      ctx.fillStyle = c.text;
      ctx.font = typeFont(TYPE.text, 900);
      fitText(row[1], x + w * .43, yy, w * .57, 'right');
    });
  }

  function drawPill(x, y, w, h, label, color, c, active, fs) {
    ctx.fillStyle = alpha(color, active ? .22 : .10);
    ctx.strokeStyle = alpha(color, active ? .60 : .26);
    roundRect(x, y, w, h, Math.min(10, h / 2), true, true);
    ctx.fillStyle = active ? color : c.text;
    const requested = pillTypeSize(fs);
    const size = Math.max(TYPE.text, Math.min(requested, h - 6));
    ctx.font = typeFont(size, 900);
    ctx.textAlign = 'center';
    fitText(label, x + 6, y + h / 2 + size * .36, w - 12, 'center');
  }

  function drawBlockPile(x, y, w, h, count, active, label, color, c) {
    ctx.fillStyle = alpha(color, active ? .22 : .10);
    ctx.strokeStyle = alpha(color, active ? .60 : .28);
    roundRect(x, y, w, h, 6, true, true);
    for (let i = 0; i < Math.min(count, 3); i++) {
      ctx.fillStyle = alpha(color, .22 + i * .06);
      roundRect(x + 7, y + 6 + i * 5, w - 14, 4, 2, true, false);
    }
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'center';
    ctx.fillText(label, x + w / 2, y + h - 8);
  }

  function immCellW(queueW, n) {
    return Math.min(72, Math.floor((queueW - 56 - Math.max(0, n - 1) * 5) / Math.max(n, 1)));
  }

  function drawImmFifoQueue(x, y, w, h, count, active, c) {
    const color = flow.gc;
    ctx.fillStyle = alpha(color, active ? .14 : .06);
    ctx.strokeStyle = alpha(color, active ? .52 : .24);
    ctx.lineWidth = active ? 1.5 : 1;
    roundRect(x, y, w, h, 6, true, true);
    ctx.font = typeFont(TYPE.text, 800);
    ctx.fillStyle = color;
    ctx.textAlign = 'left';
    ctx.fillText('imm', x + 7, y + 12);
    ctx.fillStyle = alpha(color, active ? .70 : .42);
    ctx.textAlign = 'right';
    ctx.fillText('flush →', x + w - 7, y + 12);
    if (count === 0) {
      ctx.fillStyle = c.muted;
      ctx.font = typeFont(TYPE.text, 0);
      ctx.textAlign = 'center';
      ctx.fillText('empty', x + w / 2, y + h / 2 + 4);
      return;
    }
    const maxVisible = 4;
    const nVisible = Math.min(count, maxVisible);
    const cw = immCellW(w, nVisible);
    const cellH = h - 6;
    const cellY = y + 3;
    for (let i = 0; i < nVisible; i++) {
      const bx = x + 28 + i * (cw + 5);
      const ageAlpha = active ? (.14 + i * .05) : (.07 + i * .025);
      ctx.fillStyle = alpha(color, ageAlpha);
      ctx.strokeStyle = alpha(color, active ? (.46 + i * .04) : (.22 + i * .02));
      ctx.lineWidth = 1;
      roundRect(bx, cellY, cw, cellH, 4, true, true);
      const isOverflow = count > maxVisible && i === maxVisible - 1;
      const label = isOverflow ? `+${count - maxVisible + 1}` : `blk${count - i}`;
      ctx.fillStyle = c.text;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'center';
      fitText(label, bx + 2, cellY + cellH / 2 + 4, cw - 4, 'center');
    }
  }

  function drawBits(bits, x, y, c, color) {
    for (let i = 0; i < bits.length; i++) {
      const on = bits[i] === '1';
      ctx.fillStyle = on ? alpha(color, .54) : alpha(c.border, .42);
      roundRect(x + i * 11, y, 9, 14, 3, true, false);
    }
  }

  function drawFlow(names, color, c, label, opacity, width) {
    const pts = names.map(point);
    ctx.save();
    ctx.strokeStyle = alpha(color, opacity);
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.setLineDash([9, 9]);
    drawPolyline(pts);
    ctx.setLineDash([]);
    const a = pts[pts.length - 2];
    const b = pts[pts.length - 1];
    arrowHead(a, b, alpha(color, Math.min(.78, opacity + .15)));
    if (label && opacity > .3) {
      const mid = pathPoint(pts, .52);
      ctx.fillStyle = alpha(c.text, .66);
      ctx.font = typeFont(TYPE.text, 0);
      ctx.textAlign = 'center';
      ctx.fillText(label, mid.x, mid.y - 8);
    }
    ctx.restore();
  }

  function replayAnchorSet(slot) {
    const layout = replayerPanelLayout();
    const { frame, write, visibility } = layout;
    const writeLayout = replayWriteBufferLayout(write.x, write.y, write.w, write.h);
    const { queue, fullFill } = writeLayout;
    const visibilityLayout = replayVisibilityLayout(visibility.x, visibility.y, visibility.w, visibility.h);
    const { rowY, bitmapX, bitmapW, chainY, chainH } = visibilityLayout;
    const deleteConditionY = chainY + 68;
    const offset = (slot - 1) * 18;
    return {
      center: [frame.x + frame.w / 2, frame.y + frame.h / 2],
      in: [frame.x, frame.y + 34 + offset],
      out: [frame.x + frame.w, frame.y + 34 + offset],
      left: [frame.x, frame.y + frame.h / 2 + offset],
      right: [frame.x + frame.w, frame.y + frame.h / 2 + offset],
      top: [frame.x + frame.w / 2, frame.y],
      bottom: [frame.x + frame.w / 2, frame.y + frame.h],
      active: [fullFill.x + fullFill.w / 2, fullFill.y + fullFill.h / 2],
      immutable: [queue.x + queue.w / 2, queue.y + queue.h / 2],
      visibility: [visibility.x + visibility.w / 2, visibility.y + visibility.h / 2],
      deleteArray: [visibility.x + visibility.w / 2, chainY + chainH / 2],
      deleteCondition: [visibility.x + visibility.w / 2, deleteConditionY],
      baseBitmap: [bitmapX + bitmapW / 2, rowY + 7],
      write: [write.x + write.w / 2, write.y + write.h / 2]
    };
  }

  function point(name) {
    if (Array.isArray(name)) return { x: name[0], y: name[1] };
    const lane = /^lane([0-2])\.(.+)$/.exec(name);
    if (lane) {
      const i = Number(lane[1]);
      const part = lane[2];
      const anchors = replayAnchorSet(i);
      return arrPoint(anchors[part] || anchors.center);
    }
    // Anchor selection rule for rect components:
    // - top/bottom are for vertical neighbors.
    // - left/right are for horizontal neighbors.
    // - in/out are aliases for left/right and should only be used on left-to-right flows.
    // If a component is above another, never connect out -> in; use bottom -> top.
    const parts = name.split('.');
    const r = rects[parts[0]];
    if (!r) return { x: 0, y: 0 };
    const pos = parts[1] || 'center';
    if (parts[0] === 'runtime') {
      const borderAnchors = {
        center: [r.x + r.w / 2, r.y + r.h / 2],
        left: [r.x, r.y + r.h / 2],
        right: [r.x + r.w, r.y + r.h / 2],
        top: [r.x + r.w / 2, r.y],
        bottom: [r.x + r.w / 2, r.y + r.h],
        in: [r.x, r.y + r.h / 2],
        out: [r.x + r.w, r.y + r.h / 2]
      };
      if (borderAnchors[pos]) return arrPoint(borderAnchors[pos]);
      const anchors = replayAnchorSet(1);
      if (anchors[pos]) return arrPoint(anchors[pos]);
    }
    const txWindow = parts[0] === 'tx' ? txWindowLayout(r) : null;
    const txWindowY = txWindow ? txWindow.y + txWindow.h / 2 : r.y + r.h / 2;
    const query = parts[0] === 'query' ? queryLayout(r, model.query ? model.query.splits : []) : null;
    const pixelsSink = parts[0] === 'ingress' ? pixelsSinkLayout(r) : null;
    const storageLayout = parts[0] === 'storage' ? storagePanelsLayout(r) : null;
    const fallbackStorageY = r.y + 90 + Math.max(42, (r.h - 72) - 52) / 2;
    const storageMemtableCenter = storageLayout
      ? flushedMemtableObjectCenter(storageLayout.memtable)
      : [r.x + r.w * .20, fallbackStorageY];
    const storageFilesCenter = storageLayout
      ? [storageLayout.files.x + storageLayout.files.w / 2, storageLayout.files.y + storageLayout.files.h / 2]
      : [r.x + r.w * .58, fallbackStorageY];
    const storageAgingCenter = storageLayout
      ? [storageLayout.files.x + storageLayout.files.w * .35, storageLayout.files.y + storageLayout.files.h / 2]
      : [r.x + r.w * .55, fallbackStorageY];
    const storageNewFileCenter = storageLayout
      ? [storageLayout.files.x + storageLayout.files.w * .78, storageLayout.files.y + storageLayout.files.h / 2]
      : [r.x + r.w * .86, fallbackStorageY];
    const querySplit = i => query && query.splitBoxes[i]
      ? [query.splitBoxes[i].x + query.splitBoxes[i].w / 2, query.splitBoxes[i].y + query.splitBoxes[i].h / 2]
      : [r.x + r.w / 2, r.y + r.h / 2];
    const sinkStepPoint = (id, side = 'center') => {
      const box = pixelsSink && pixelsSink.byId[id];
      if (!box) return [r.x + r.w / 2, r.y + r.h / 2];
      if (side === 'left') return [box.x, box.y + box.h / 2];
      if (side === 'right') return [box.x + box.w, box.y + box.h / 2];
      if (side === 'top') return [box.x + box.w / 2, box.y];
      if (side === 'bottom') return [box.x + box.w / 2, box.y + box.h];
      return [box.x + box.w / 2, box.y + box.h / 2];
    };
    const sinkBorderStepPoint = (id, side = 'right') => {
      const box = pixelsSink && pixelsSink.byId[id];
      const y = box ? box.y + box.h / 2 : r.y + r.h / 2;
      if (side === 'left') return [r.x, y];
      return [r.x + r.w, y];
    };

    const custom = {
      center: [r.x + r.w / 2, r.y + r.h / 2],
      left: [r.x, r.y + r.h / 2],
      right: [r.x + r.w, r.y + r.h / 2],
      top: [r.x + r.w / 2, r.y],
      bottom: [r.x + r.w / 2, r.y + r.h],
      read: sinkStepPoint('read'),
      readLeft: sinkStepPoint('read', 'left'),
      readRight: sinkStepPoint('read', 'right'),
      build: sinkStepPoint('build'),
      buildLeft: sinkStepPoint('build', 'left'),
      buildRight: sinkStepPoint('build', 'right'),
      begin: sinkStepPoint('begin'),
      beginLeft: sinkStepPoint('begin', 'left'),
      beginRight: sinkBorderStepPoint('begin', 'right'),
      replay: sinkStepPoint('replay'),
      replayLeft: sinkStepPoint('replay', 'left'),
      replayRight: sinkBorderStepPoint('replay', 'right'),
      commit: sinkStepPoint('commit'),
      commitLeft: sinkStepPoint('commit', 'left'),
      commitRight: sinkBorderStepPoint('commit', 'right'),
      insertRight: sinkBorderStepPoint('insert', 'right'),
      deleteRight: sinkBorderStepPoint('delete', 'right'),
      updateRight: sinkBorderStepPoint('update', 'right'),
      sources: query ? [query.scheduler.x + query.scheduler.w / 2, query.scheduler.y + query.scheduler.h / 2] : [r.x + r.w / 2, r.y + 158],
      scheduler: query ? [query.scheduler.x + query.scheduler.w / 2, query.scheduler.y + query.scheduler.h / 2] : [r.x + r.w / 2, r.y + 158],
      splitRegular: querySplit(0),
      splitActive: querySplit(1),
      splitFlushed: querySplit(2),
      filter: query ? [query.gateBox.x + query.gateBox.w / 2, query.gateBox.y + query.gateBox.h / 2] : [r.x + r.w / 2, r.y + 617],
      gate: query ? [query.gateBox.x + query.gateBox.w / 2, query.gateBox.y + query.gateBox.h / 2] : [r.x + r.w / 2, r.y + 617],
      queue: query ? [query.queueBox.x + query.queueBox.w / 2, query.queueBox.y + query.queueBox.h / 2] : [r.x + r.w / 2, r.y + 745],
      operators: query ? [query.opsBox.x + query.opsBox.w / 2, query.opsBox.y + query.opsBox.h / 2] : [r.x + r.w / 2, r.y + 841],
      recordIn: [r.x, r.y + 80],
      cacheIn: [r.x + 10, r.y + 118],
      cacheOut: [r.x + 10, r.y + 150],
      toSinkLeft: [r.x + r.w * .38, r.y + r.h],
      toSinkRight: [r.x + r.w * .62, r.y + r.h],
      fromCdcLeft: [r.x + r.w * .38, r.y],
      fromCdcRight: [r.x + r.w * .62, r.y],
      in: [r.x, r.y + r.h / 2],
      out: [r.x + r.w, r.y + r.h / 2],
      tx: [r.x + r.w, r.y + 74],
      commit: [r.x + r.w - 48, r.y + r.h - 18],
      lwm: [r.x + 72, txWindowY],
      hwm: [r.x + r.w - 72, txWindowY],
      window: [r.x + r.w / 2, txWindowY],
      blocks: storageMemtableCenter,
      objects: storageMemtableCenter,
      memtable: storageMemtableCenter,
      files: storageFilesCenter,
      aging: storageAgingCenter,
      newFile: storageNewFileCenter,
      storage: [r.x + r.w * .76, r.y + r.h]
    };
    return arrPoint(custom[pos] || custom.center);
  }

  function arrPoint(a) { return { x: a[0], y: a[1] }; }

  function pathPoint(points, t) {
    if (points.length === 1) return points[0];
    const lengths = [];
    let total = 0;
    for (let i = 0; i < points.length - 1; i++) {
      const d = dist(points[i], points[i + 1]);
      lengths.push(d);
      total += d;
    }
    let target = clamp(t, 0, 1) * total;
    for (let i = 0; i < lengths.length; i++) {
      if (target <= lengths[i]) {
        const a = points[i], b = points[i + 1], k = lengths[i] ? target / lengths[i] : 0;
        return { x: lerp(a.x, b.x, k), y: lerp(a.y, b.y, k) };
      }
      target -= lengths[i];
    }
    return points[points.length - 1];
  }

  function drawPolyline(points) {
    if (!points.length) return;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.stroke();
  }

  function arrowHead(a, b, color) {
    const ang = Math.atan2(b.y - a.y, b.x - a.x);
    const r = 8;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - r * Math.cos(ang - .55), b.y - r * Math.sin(ang - .55));
    ctx.lineTo(b.x - r * Math.cos(ang + .55), b.y - r * Math.sin(ang + .55));
    ctx.closePath();
    ctx.fill();
  }

  function isHighlighted(key) { return currentStep().highlights.includes(key); }

  function wrapText(text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let yy = y;
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, yy);
        line = word;
        yy += lineHeight;
      } else {
        line = test;
      }
    }
    if (line) ctx.fillText(line, x, yy);
  }

  function fitText(text, x, y, maxWidth, align) {
    if (!Number.isFinite(maxWidth) || maxWidth <= 0) return;
    let str = String(text);
    const originalFont = ctx.font;
    if (ctx.measureText(str).width > maxWidth) str = ellipsizeText(str, maxWidth);
    if (align === 'center') {
      ctx.textAlign = 'center';
      ctx.fillText(str, x + maxWidth / 2, y);
    } else if (align === 'right') {
      ctx.textAlign = 'right';
      ctx.fillText(str, x + maxWidth, y);
    } else {
      ctx.textAlign = 'left';
      ctx.fillText(str, x, y);
    }
    ctx.font = originalFont;
  }

  function ellipsizeText(str, maxWidth) {
    const suffix = '...';
    if (ctx.measureText(suffix).width > maxWidth) return '';
    let lo = 0;
    let hi = str.length;
    while (lo < hi) {
      const mid = Math.ceil((lo + hi) / 2);
      if (ctx.measureText(str.slice(0, mid) + suffix).width <= maxWidth) lo = mid;
      else hi = mid - 1;
    }
    return str.slice(0, lo) + suffix;
  }

  function shadow(c) {
    ctx.shadowColor = c.shadow;
    ctx.shadowBlur = c.dark ? 14 : 12;
    ctx.shadowOffsetY = 6;
  }

  function roundRect(x, y, w, h, r, fill, stroke) {
    const rr = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function alpha(hex, a) {
    const clean = hex.replace('#', '').trim();
    const full = clean.length === 3 ? clean.split('').map(ch => ch + ch).join('') : clean;
    const n = parseInt(full, 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function ease(t) { return t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
  function dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }
  function map(v, a0, a1, b0, b1) { return b0 + (v - a0) / (a1 - a0) * (b1 - b0); }

  function loop(now) {
    const dt = Math.min(.05, (now - state.last) / 1000);
    state.last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', scheduleResize);
  window.addEventListener('load', scheduleResize);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', scheduleResize);
  }
  scheduleResize();
  gotoScene('cdc');
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
