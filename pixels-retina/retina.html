<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retina Animation Demo</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-elevated: #fbfdff;
      --surface-muted: #eef3f8;
      --surface-subtle: #f7f9fc;
      --text: #122033;
      --muted: #667386;
      --border: #b8c4d3;
      --border-soft: #c7d2df;
      --primary: #315fcb;
       --primary-hover: #254ead;
      --primary-soft: #eaf0ff;
      --cdc-path: #c96a1a;
      --replay-path: #168a52;
      --query-path: #0e7490;
      --index-path: #2867c7;
      --gc-path: #b7791f;
      --danger: #c2413d;
      --shadow-sm: 0 2px 8px rgba(15, 23, 42, .06);
      --shadow-md: 0 10px 28px rgba(15, 23, 42, .10);
      --shadow-lg: 0 18px 44px rgba(15, 23, 42, .12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --transition: 160ms ease;
      --content-max: 1960px;
      --page-pad: clamp(6px, .75vw, 12px);
      --frame-pad: clamp(6px, .65vw, 10px);
      --gap: clamp(5px, .45vw, 8px);
      --rail-w: clamp(54px, 4.2vw, 64px);
      --rail-btn: clamp(38px, 3vw, 44px);
      --top-btn: clamp(30px, 2.2vw, 34px);
      --panel: var(--surface);
      --panel-2: var(--surface-muted);
      --panel-3: #e4ebf3;
      --accent: var(--primary);
      --accent-2: var(--replay-path);
      --button: var(--primary);
      --button-hover: var(--primary-hover);
      --shadow: rgba(15, 23, 42, .12);
    }

    html[data-theme="dark"] {
      --bg: #0f151e;
      --surface: #171f2a;
      --surface-elevated: #1c2633;
      --surface-muted: #222d3b;
      --surface-subtle: #141b24;
      --text: #edf2f7;
      --muted: #9aa8b8;
      --border: #344256;
      --border-soft: #2a3546;
      --primary: #6ea8ff;
      --primary-hover: #8bbcff;
      --primary-soft: #1d3358;
      --cdc-path: #f59e54;
      --replay-path: #48c78e;
      --query-path: #38bdf8;
      --index-path: #7aa7ff;
      --gc-path: #f0b35a;
      --danger: #f87171;
      --shadow-sm: 0 2px 10px rgba(0, 0, 0, .20);
      --shadow-md: 0 10px 30px rgba(0, 0, 0, .30);
      --shadow-lg: 0 18px 46px rgba(0, 0, 0, .38);
      --panel: var(--surface);
      --panel-2: var(--surface-muted);
      --panel-3: #2a3546;
      --accent: var(--primary);
      --accent-2: var(--replay-path);
      --button: #3b73d9;
      --button-hover: #5f91ee;
      --shadow: rgba(0, 0, 0, .34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% -18%, color-mix(in srgb, var(--primary) 8%, transparent), transparent 38%),
        linear-gradient(180deg, color-mix(in srgb, var(--bg) 92%, #fff) 0%, var(--bg) 46%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      border: 1px solid color-mix(in srgb, var(--primary) 45%, var(--border));
      background: linear-gradient(180deg, color-mix(in srgb, var(--button) 92%, #fff), var(--button));
      color: #fff;
      border-radius: var(--radius-sm);
      padding: 7px 9px;
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      min-height: 34px;
      transition: transform var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition), color var(--transition);
    }

    button:hover {
      background: linear-gradient(180deg, color-mix(in srgb, var(--button-hover) 90%, #fff), var(--button-hover));
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    button:focus-visible { outline: 3px solid color-mix(in srgb, var(--primary) 24%, transparent); outline-offset: 2px; }

    button.scene-btn {
      color: var(--text);
      background: color-mix(in srgb, var(--surface-elevated) 94%, transparent);
      border-color: var(--border-soft);
      box-shadow: none;
    }

    button.scene-btn:hover {
      background: var(--surface);
      border-color: color-mix(in srgb, var(--primary) 30%, var(--border));
      box-shadow: var(--shadow-sm);
    }

    button.active,
    button.scene-btn.active {
      color: #fff;
      background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 92%, #fff), var(--primary));
      border-color: color-mix(in srgb, var(--primary) 86%, var(--border));
      box-shadow: var(--shadow-sm);
    }

    button.scene-btn.active {
      background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 88%, #fff), color-mix(in srgb, var(--primary) 92%, #111827));
    }

    button.icon-btn {
      width: var(--top-btn);
      height: var(--top-btn);
      min-width: var(--top-btn);
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button.icon-btn svg { pointer-events: none; }

    .shell {
      width: 100%;
      min-height: 100dvh;
      padding: var(--page-pad);
    }

    .app-frame {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      backdrop-filter: none;
      display: grid;
      grid-template-rows: auto auto auto;
      align-content: start;
      gap: var(--gap);
    }

    .demo-layout {
      width: 100%;
      max-width: none;
      margin: 0;
      display: grid;
      grid-template-columns: var(--rail-w) minmax(0, 1fr);
      gap: var(--gap);
      align-items: stretch;
      min-height: calc(100dvh - var(--page-pad) * 2);
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .control-rail {
      width: var(--rail-w);
      padding: clamp(6px, .6vw, 8px);
      min-height: 0;
      align-self: center;
      position: relative;
      z-index: 15;
      overflow: visible;
      background: color-mix(in srgb, var(--surface-elevated) 66%, transparent);
      border: 1px solid color-mix(in srgb, var(--border-soft) 72%, transparent);
      border-radius: var(--radius-lg);
      box-shadow: none;
      backdrop-filter: blur(12px);
    }

    .control-section + .control-section {
      margin-top: var(--gap);
      padding-top: var(--gap);
      border-top: 1px solid var(--border-soft);
    }

    .section-title {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .playback-grid,
    .scene-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(6px, .6vw, 8px);
    }

    .control-rail .icon-btn,
    .control-rail .scene-btn {
      width: var(--rail-btn);
      height: var(--rail-btn);
      min-width: var(--rail-btn);
      min-height: var(--rail-btn);
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: clamp(12px, .95vw, 14px);
      position: relative;
      overflow: visible;
      background: color-mix(in srgb, var(--surface-elevated) 94%, transparent);
      color: var(--text);
      border-color: var(--border-soft);
      box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 46%, transparent);
    }

    .control-rail .icon-btn svg,
    .scene-glyph svg {
      width: clamp(18px, 1.35vw, 20px);
      height: clamp(18px, 1.35vw, 20px);
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .scene-glyph {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .control-rail button::before,
    .control-rail button::after {
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition), transform var(--transition);
      z-index: 40;
    }

    .control-rail button::before {
      content: '';
      width: 8px;
      height: 8px;
      background: color-mix(in srgb, var(--surface-elevated) 96%, transparent);
      border-left: 1px solid var(--border-soft);
      border-bottom: 1px solid var(--border-soft);
      transform: translate(-5px, -50%) rotate(45deg);
    }

    .control-rail button::after {
      content: attr(data-label);
      transform: translateY(-50%) translateX(-4px);
      white-space: nowrap;
      padding: 7px 10px;
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface-elevated) 96%, transparent);
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .01em;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
    }

    .control-rail button:hover {
      transform: translateX(3px) scale(1.08);
      background: var(--surface);
      border-color: color-mix(in srgb, var(--primary) 34%, var(--border));
      color: var(--primary);
      box-shadow: 0 10px 24px color-mix(in srgb, var(--primary) 16%, transparent);
    }

    .control-rail button:hover::before,
    .control-rail button:hover::after,
    .control-rail button:focus-visible::before,
    .control-rail button:focus-visible::after {
      opacity: 1;
    }

    .control-rail button:hover::after,
    .control-rail button:focus-visible::after {
      transform: translateY(-50%) translateX(0);
    }

    .control-rail button:hover::before,
    .control-rail button:focus-visible::before {
      transform: translate(-5px, -50%) rotate(45deg) translateX(0);
    }

    .control-rail button.active,
    .control-rail button.scene-btn.active {
      color: #fff;
      background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 88%, #fff), color-mix(in srgb, var(--primary) 92%, #111827));
      border-color: color-mix(in srgb, var(--primary) 82%, var(--border));
      box-shadow:
        0 10px 24px color-mix(in srgb, var(--primary) 28%, transparent),
        0 0 0 4px color-mix(in srgb, var(--primary) 12%, transparent);
    }

    .control-rail button.active:hover,
    .control-rail button.scene-btn.active:hover {
      color: #fff;
    }

    .canvas-card {
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: calc(100dvh - var(--page-pad) * 2);
      min-width: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    canvas {
      display: block;
      max-width: 100%;
      border-radius: clamp(8px, .8vw, 14px);
    }

    @media (max-width: 1180px) {
      :root {
        --rail-w: clamp(54px, 4.2vw, 64px);
      }
    }

    @media (max-width: 980px) {
      .shell { padding: 8px; }
      .demo-layout { grid-template-columns: 1fr; align-items: start; }
      .control-rail {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        overflow: visible;
      }
      .control-section + .control-section { margin-top: 0; padding-top: 0; padding-left: 10px; border-top: 0; border-left: 1px solid var(--border-soft); }
      .playback-grid, .scene-list { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .control-rail .icon-btn, .control-rail .scene-btn { width: var(--rail-btn); min-width: var(--rail-btn); justify-content: center; padding: 0; }
      .control-rail button::after { display: none; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="app-frame">
      <section class="demo-layout">
        <aside class="control-rail" aria-label="Retina demo controls">
        <section class="control-section">
          <div class="section-title"><h2>Run control</h2><span id="modeLabel">Playing</span></div>
          <div class="playback-grid">
            <button id="pauseBtn" class="icon-btn" data-label="Pause / Resume" title="Pause / Resume" aria-label="Pause / Resume"></button>
            <button id="autoBtn" class="icon-btn active" data-label="Auto Replay" title="Auto Replay" aria-label="Auto Replay"></button>
            <button id="speedBtn" class="icon-btn" data-label="Speed 1x" title="Speed 1x" aria-label="Speed 1x"></button>
          </div>
        </section>

        <section class="control-section">
          <div class="section-title"><h2>Mechanism scenes</h2></div>
          <div class="scene-list">
            <button class="scene-btn" data-scene="insert" data-label="Insert Replay" title="Insert Replay" aria-label="Insert Replay">
              <span class="scene-glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6c0 1.657 3.582 3 8 3s8 -1.343 8 -3s-3.582 -3 -8 -3s-8 1.343 -8 3"/><path d="M4 6v6c0 1.657 3.582 3 8 3c1.075 0 2.1 -.08 3.037 -.224"/><path d="M20 12v-6"/><path d="M4 12v6c0 1.657 3.582 3 8 3c.166 0 .331 -.002 .495 -.006"/><path d="M16 19h6"/><path d="M19 16v6"/></svg></span>
            </button>
            <button class="scene-btn" data-scene="delete" data-label="Delete Replay" title="Delete Replay" aria-label="Delete Replay">
              <span class="scene-glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6c0 1.657 3.582 3 8 3s8 -1.343 8 -3s-3.582 -3 -8 -3s-8 1.343 -8 3"/><path d="M4 6v6c0 1.657 3.582 3 8 3c.537 0 1.062 -.02 1.57 -.058"/><path d="M20 13.5v-7.5"/><path d="M4 12v6c0 1.657 3.582 3 8 3c.384 0 .762 -.01 1.132 -.03"/><path d="M22 22l-5 -5"/><path d="M17 22l5 -5"/></svg></span>
            </button>
            <button class="scene-btn" data-scene="update" data-label="Update Replay" title="Update Replay" aria-label="Update Replay">
              <span class="scene-glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6c0 1.657 3.582 3 8 3s8 -1.343 8 -3s-3.582 -3 -8 -3s-8 1.343 -8 3"/><path d="M4 6v6c0 1.657 3.582 3 8 3c.478 0 .947 -.016 1.402 -.046"/><path d="M20 12v-6"/><path d="M4 12v6c0 1.526 3.04 2.786 6.972 2.975"/><path d="M18.42 15.61a2.1 2.1 0 0 1 2.97 2.97l-3.39 3.42h-3v-3l3.42 -3.39"/></svg></span>
            </button>
            <button class="scene-btn" data-scene="gc" data-label="Garbage Collection" title="Garbage Collection" aria-label="Garbage Collection">
              <span class="scene-glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17l-2 2l2 2"/><path d="M10 19h9a2 2 0 0 0 1.75 -2.75l-.55 -1"/><path d="M8.536 11l-.732 -2.732l-2.732 .732"/><path d="M7.804 8.268l-4.5 7.794a2 2 0 0 0 1.506 2.89l1.141 .024"/><path d="M15.464 11l2.732 .732l.732 -2.732"/><path d="M18.196 11.732l-4.5 -7.794a2 2 0 0 0 -3.256 -.14l-.591 .976"/></svg></span>
            </button>
            <button class="scene-btn" data-scene="query" data-label="Query Path" title="Query Path" aria-label="Query Path">
              <span class="scene-glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6c0 1.657 3.582 3 8 3s8 -1.343 8 -3s-3.582 -3 -8 -3s-8 1.343 -8 3"/><path d="M4 6v6c0 1.657 3.582 3 8 3m8 -3.5v-5.5"/><path d="M4 12v6c0 1.657 3.582 3 8 3"/><path d="M15 18a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/><path d="M20.2 20.2l1.8 1.8"/></svg></span>
            </button>
          </div>
        </section>

        </aside>

        <section class="canvas-card">
          <canvas id="retinaCanvas" aria-label="Retina architecture animation canvas"></canvas>
        </section>
      </section>

    </section>
  </main>

<script>
(() => {
  const canvas = document.getElementById('retinaCanvas');
  const ctx = canvas.getContext('2d');
  const root = document.documentElement;
  const buttons = {
    pause: document.getElementById('pauseBtn'),
    auto: document.getElementById('autoBtn'),
    speed: document.getElementById('speedBtn')
  };
  const dom = {
    modeLabel: document.getElementById('modeLabel')
  };
  const sceneButtons = Array.from(document.querySelectorAll('[data-scene]'));

  const svgPause = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"/><path d="M14 5m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"/></svg>';
  const svgPlay = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16l13 -8z"/></svg>';
  const svgFastFwd = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5v14l8 -7z"/><path d="M13 5v14l8 -7z"/></svg>';
  const svgGauge = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14l4 -4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/><path d="M5 19h14"/></svg>';

  buttons.pause.innerHTML = svgPause;
  buttons.auto.innerHTML = svgFastFwd;
  buttons.speed.innerHTML = svgGauge;

  const W = 1800;
  const H = 1080;
  const ASPECT = W / H;
  const CANVAS_Y_SHIFT = 64;
  const sy = y => y - CANVAS_Y_SHIFT;

  const AUTO_START_SCENE = 'cdc';
  const autoSceneOrder = ['cdc'];
  const sceneOrder = ['insert', 'delete', 'update', 'query', 'gc'];
  const flow = {
    cdc: '#c96a1a',
    replay: '#168a52',
    query: '#0e7490',
    visibility: '#6d5bd0',
    gc: '#b7791f',
    tx: '#315fcb',
    storage: '#0f766e',
    index: '#2867c7',
    delete: '#c2413d'
  };

  const TYPE = {
    moduleTitle: 18,
    subTitle: 16,
    text: 14
  };
  const MODULE_TITLE_X = 16;
  const MODULE_TITLE_Y = 32;
  const MODULE_ICON_SIZE = 32;
  const MODULE_ICON_GAP = 8;
  const MODULE_CONTENT_GAP = 20;
  const MODULE_CONTENT_PAD = 20;
  const PANEL_TITLE_X = 12;
  const PANEL_TITLE_Y = 25;
  const INDEX_MAP_TITLE_X = 8;
  const INDEX_MAP_TITLE_Y = 18;
  const INDEX_MAP_CELL_PAD = 8;
  const INDEX_MAP_ARROW_GAP = 8;
  const INDEX_PRIMARY_KEY_W = 70;
  const INDEX_PRIMARY_VALUE_W = 52;
  const INDEX_MAIN_KEY_W = 52;
  const INDEX_MAIN_VALUE_W = 130;

  const STANDARD_STEP_UNITS = 3.8;
  const ANIMATION_BEAT_SECONDS = 2;
  const STREAM_CYCLE_RATE = 1 / ANIMATION_BEAT_SECONDS;
  const PLAYBACK_RATES = [1, 2, 3, .5];
  const DEFAULT_HWM = 290;
  const DEFAULT_LWM = 281;
  const DEFAULT_QUERY_TS = DEFAULT_HWM - 1;
  const DEFAULT_GC_SAFE_TS = DEFAULT_LWM - 1;
  const TX_WINDOW_MIN_TS = DEFAULT_LWM - 10;
  const TX_WINDOW_MAX_TS = DEFAULT_HWM + 8;
  const GC_BASE_BITMAP = '0100000100000100';
  const QUERY_BASE_BITMAP = GC_BASE_BITMAP;
  const QUERY_BITMAP = '0100010101000100';
  const GC_FOLD_TARGET_OFFSET = 5;
  const QUERY_DISPLAY_ROW_COUNT = 5;
  const QUERY_TABLE_Y = 108;
  const QUERY_TABLE_ROW_H = 28;
  const QUERY_TABLE_ROW_BODY_H = 22;
  const QUERY_TABLE_BOTTOM_PAD = 10;

  function typeFont(size, weight = 800, family = 'Inter, system-ui, sans-serif') {
    const prefix = weight ? `${weight} ` : '';
    return `${prefix}${size}px ${family}`;
  }

  const MIDDLE_TOP = sy(74);
  const MIDDLE_BOTTOM = H - 10;
  const MIDDLE_H = MIDDLE_BOTTOM - MIDDLE_TOP;
  const SERVICE_Y = MIDDLE_TOP;
  const SERVICE_H = 186;
  const TX_SERVICE_H = 144;
  const TOP_RUNTIME_GAP = 14;
  const RUNTIME_Y = SERVICE_Y + SERVICE_H + TOP_RUNTIME_GAP;
  const RETINA_REPLAYER_H = 500;
  const LEFT_PANEL_X = 44;
  const LEFT_PANEL_W = 440;
  const SERVICE_X = LEFT_PANEL_X + LEFT_PANEL_W + 10;
  const SERVICE_GAP = 18;
  const RUNTIME_STORAGE_GAP = 18;
  const RETINA_REPLAYER_W = 450;
  const STORAGE_X = SERVICE_X + RETINA_REPLAYER_W + RUNTIME_STORAGE_GAP;
  const STORAGE_EDGE_PAD = 20;
  const STORAGE_PANEL_GAP = 20;
  const STORAGE_ITEM_BOTTOM_PAD = 20;
  const STORAGE_PANEL_TITLE_X = 8;
  const STORAGE_PANEL_TITLE_Y = 18;
  const STORAGE_TITLE_ITEM_GAP = 16;
  const STORAGE_COMPACT_PANEL_H = 129;
  const STORAGE_ITEM_CAPACITY = 5;
  const STORAGE_COMPACT_ITEM_W = 52;

  function step(caption, duration, highlights, tokens, apply, detail, channels, anim) {
    // Authored duration keeps path-speed proportions; the beat sets global tempo.
    const units = Number.isFinite(duration) && duration > 0 ? duration : STANDARD_STEP_UNITS;
    return { caption, duration: units * ANIMATION_BEAT_SECONDS / STANDARD_STEP_UNITS, highlights, tokens, apply, detail: detail || 'overview', channels: channels || [], anim: anim || null };
  }

  // Path geometry constraint:
  // A token path is also the arrow path. Choose anchors by component layout, not by
  // data semantics. Vertically stacked components must use bottom -> top or top -> bottom.
  // Side-by-side components must use right -> left or left -> right. Return paths should
  // enter the side facing the sender. Avoid generic in/out unless the components are
  // actually laid out left-to-right; otherwise events will appear to ignore the arrow.
  function tok(label, from, to, color, start, end, via) {
    return { label, path: via ? [from, ...via, to] : [from, to], color, start, end };
  }

  function settlePendingFlushObject(m) {
    const pending = m.storage.pendingFlushObject;
    if (pending && !m.storage.objectEntries.includes(pending)) {
      m.storage.objectEntries.unshift(pending);
    }
    m.storage.pendingFlushObject = null;
    m.storage.flushedHot = null;
  }

        m.storage.objectEntries = [];
        if (!m.storage.regularFiles.includes(fileLabel)) m.storage.regularFiles.push(fileLabel);
        m.storage.pendingFlushObject = null;
        m.storage.flushedHot = null;
        m.storage.cleanup = 'compact objects to file';
      }, 'storage', ['storage'], 'compactObjectsToFile');
  }

  function clearDeleteTsChainEffects(m, laneId) {
    const lane = m.lanes[laneId];
    if (lane) {
      lane.highlight = null;
      if (/append delete timestamp/i.test(lane.status || '')) lane.status = 'idle';
    }
    m.index.operation = 'idle';
    m.storage.cleanup = 'idle';
  }

  function resize() {
    state.dpr = Math.max(1, window.devicePixelRatio || 1);
    const card = canvas.parentElement;
    const shell = document.querySelector('.shell');
    const frame = card.closest('.app-frame');
    const viewportH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const cardRect = card.getBoundingClientRect();
    const shellStyle = shell ? getComputedStyle(shell) : null;
    const shellBottom = shellStyle ? parseFloat(shellStyle.paddingBottom || 0) || 0 : 0;
    const availW = Math.max(320, card.clientWidth || cardRect.width);
    const availH = document.fullscreenElement
      ? Math.max(320, card.clientHeight || viewportH)
      : Math.max(300, viewportH - cardRect.top - shellBottom);
    let cssW = availW;
    let cssH = cssW / ASPECT;
    if (cssH > availH) {
      cssH = availH;
      cssW = cssH * ASPECT;
    }
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width = Math.round(cssW * state.dpr);
    canvas.height = Math.round(cssH * state.dpr);
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
  }

  function scheduleResize() {
    resize();
    requestAnimationFrame(() => {
      resize();
      requestAnimationFrame(resize);
    });
  }

  function palette() {
    const dark = root.dataset.theme === 'dark';
    return {
      dark,
      bg: dark ? '#0f151e' : '#f5f7fb',
      panel: dark ? '#171f2a' : '#ffffff',
      panel2: dark ? '#222d3b' : '#eef3f8',
      panel3: dark ? '#2a3546' : '#e4ebf3',
      elevated: dark ? '#1c2633' : '#fbfdff',
      subtle: dark ? '#141b24' : '#f7f9fc',
      text: dark ? '#edf2f7' : '#122033',
      muted: dark ? '#9aa8b8' : '#667386',
      border: dark ? '#344256' : '#b8c4d3',
      borderSoft: dark ? '#2a3546' : '#c7d2df',
      grid: dark ? '#263244' : '#dce5ef',
      shadow: dark ? 'rgba(0,0,0,.28)' : 'rgba(15,23,42,.10)',
      accent: dark ? '#6ea8ff' : '#315fcb'
    };
  }

  function currentStep() { return scenes[state.scene][state.stepIndex]; }

  function playbackRate() { return PLAYBACK_RATES[state.playbackRateIndex] || 1; }

  function speedLabel() { return `${playbackRate()}x`; }

  function stepProgress(eased = false) {
    const p = clamp(state.stepClock / Math.max(.001, currentStep().duration), 0, 1);
    return eased ? ease(p) : p;
  }

  function streamCycleProgress(offset = 0) {
    return (state.stepClock * STREAM_CYCLE_RATE + offset) % 1;
  }

  function gotoScene(scene, opts = {}) {
    if (!scenes[scene]) return;
    if (opts.manual) {
      state.autoPlay = false;
      state.manualRun = true;
      state.paused = false;
      buttons.pause.innerHTML = svgPause;
    } else {
      state.manualRun = false;
    }
    state.scene = scene;
    state.stepIndex = 0;
    state.stepClock = 0;
    model = sceneBase(scene);
    enterStep();
    updateControls();
  }

  function enterStep() {
    state.stepClock = 0;
    const st = currentStep();
    state.detailFocus = st.detail || 'overview';
    state.activeChannels = st.channels || [];
    model.lanes.forEach(l => {
      l.prevActiveRows = l.activeRows;
      l.prevImmutable = l.immutable;
      l.prevDeleteTs = [...l.deleteTs];
      l.prevBaseTs = l.baseTs;
      l.prevBaseBitmap = l.baseBitmap;
    });
    if (model.storage) {
      model.storage.prevRegularFiles = [...model.storage.regularFiles];
      model.storage.prevObjectEntries = [...model.storage.objectEntries];
      model.storage.queryHotObject = null;
      model.storage.queryHotFile = null;
    }
    if (st.apply) st.apply(model);
    updateControls();
  }

  function advanceStep() {
    const list = scenes[state.scene];
    if (state.stepIndex < list.length - 1) {
      state.stepIndex += 1;
      enterStep();
      return;
    }
    if (state.manualRun) {
      state.manualRun = false;
      state.stepClock = currentStep().duration;
      updateControls();
      return;
    }
    if (!state.autoPlay) {
      updateControls();
      return;
    }
    const order = autoSceneOrder.length ? autoSceneOrder : [AUTO_START_SCENE];
    const idx = order.indexOf(state.scene);
    const nextScene = idx >= 0 ? order[(idx + 1) % order.length] : order[0];
    gotoScene(nextScene);
  }

  function togglePause() {
    state.paused = !state.paused;
    buttons.pause.innerHTML = state.paused ? svgPlay : svgPause;
    updateControls();
  }

  function toggleSpeed() {
    state.playbackRateIndex = (state.playbackRateIndex + 1) % PLAYBACK_RATES.length;
    updateControls();
  }

  function toggleAuto() {
    if (state.autoPlay) {
      state.autoPlay = false;
      state.manualRun = false;
      updateControls();
      return;
    }
    state.autoPlay = true;
    state.manualRun = false;
    state.paused = false;
    buttons.pause.innerHTML = svgPause;
    gotoScene(AUTO_START_SCENE);
  }

  function updateControls() {
    sceneButtons.forEach(btn => {
      const active = state.autoPlay && btn.dataset.scene === state.scene;
      btn.classList.toggle('active', active);
      btn.toggleAttribute('aria-current', active);
    });
    buttons.auto.classList.toggle('active', state.autoPlay);
    buttons.speed.classList.toggle('active', playbackRate() !== 1);
    const pauseLabel = state.paused ? 'Resume' : 'Pause';
    const autoLabel = state.autoPlay ? 'Auto Replay' : 'Manual Replay';
    const speedText = `Speed ${speedLabel()}`;
    buttons.pause.dataset.label = pauseLabel;
    buttons.pause.title = pauseLabel;
    buttons.pause.setAttribute('aria-label', pauseLabel);
    buttons.auto.dataset.label = autoLabel;
    buttons.auto.title = autoLabel;
    buttons.auto.setAttribute('aria-label', autoLabel);
    buttons.speed.dataset.label = speedText;
    buttons.speed.title = speedText;
    buttons.speed.setAttribute('aria-label', speedText);
    dom.modeLabel.textContent = state.paused ? 'Paused' : state.autoPlay ? 'Auto Replay' : state.manualRun ? 'Manual Replay' : 'Manual Complete';
  }

  buttons.pause.onclick = togglePause;
  buttons.auto.onclick = toggleAuto;
  buttons.speed.onclick = toggleSpeed;
  sceneButtons.forEach(btn => btn.addEventListener('click', () => gotoScene(btn.dataset.scene, { manual: true })));

  window.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); togglePause(); }
    const k = e.key.toLowerCase();
    if (k === 'a') toggleAuto();
    if (k === 's') toggleSpeed();
    const digit = Number(e.key);
    if (digit >= 1 && digit <= sceneOrder.length) gotoScene(sceneOrder[digit - 1], { manual: true });
  });

  canvas.addEventListener('mousemove', e => {
    const p = eventPoint(e);
    state.mouse = p;
    state.hoverKey = hitTest(p.x, p.y);
    canvas.style.cursor = state.hoverKey ? 'help' : 'default';
  });
  canvas.addEventListener('mouseleave', () => { state.hoverKey = null; });

  function eventPoint(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) * W / canvas.offsetWidth,
      y: (e.clientY - r.top) * H / canvas.offsetHeight
    };
  }

  function hitTest(x, y) {
    const zones = [
      ['ingress', rects.ingress], ['runtime', rects.runtime],
      ['tx', rects.tx], ['index', rects.index],
      ['storage', rects.storage]
    ];
    for (let i = zones.length - 1; i >= 0; i--) {
      const [key, r] = zones[i];
      if (inside(x, y, r)) return key;
    }
    return null;
  }

  function inside(x, y, r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function update(dt) {
    const running = state.autoPlay || state.manualRun;
    if (!state.paused && running) {
      const scaledDt = dt * playbackRate();
      state.stepClock += scaledDt;
      state.flash = Math.max(0, state.flash - scaledDt / ANIMATION_BEAT_SECONDS);
      const st = currentStep();
      if (state.stepClock >= st.duration) advanceStep();
    }
    updateControls();
  }

  function draw() {
    const c = palette();
    ctx.clearRect(0, 0, W, H);
    drawBackground(c);
    drawCanvasHeader(c);
    drawBoundaries(c);
    drawStaticFlows(c);
    drawPixelsSink(c);
    drawTransactionService(c);
    drawIndex(c);
    drawReplayers(c);
    drawStorage(c);
    drawAsyncFlushMemtable(c);
    drawQueryOverlay(c);
    drawQueryTopFlows(c);
    drawTokens(c);
    drawCommitWait(c);
    if (state.flash > 0) {
      ctx.fillStyle = alpha(c.accent, state.flash * .08);
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawBackground(c) {
    ctx.fillStyle = c.bg;
    ctx.fillRect(0, 0, W, H);
  }

  function drawCanvasHeader(c) {
    if (!document.fullscreenElement) return;

    const st = currentStep();
    const x = 1218, y = 6, w = 526;
    ctx.fillStyle = alpha(c.elevated, .86);
    ctx.strokeStyle = c.borderSoft;
    roundRect(x, y, w, 38, 10, true, true);
    ctx.fillStyle = state.paused ? flow.delete : state.autoPlay ? flow.replay : flow.tx;
    ctx.beginPath();
    ctx.arc(x + 20, y + 19, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    ctx.fillText(state.paused ? 'Paused' : state.autoPlay ? 'Playing' : 'Stepped', x + 34, y + 18);
    ctx.fillStyle = c.muted;
    ctx.textAlign = 'right';
    ctx.fillText(`Step ${state.stepIndex + 1}/${scenes[state.scene].length} · ${state.detailFocus}`, x + w - 16, y + 18);
  }

  function drawBoundaries(c) {
    drawBoundary(rects.ingress, c, 'ingress');
    drawBoundary(rects.runtime, c, 'runtime');
  }

  function drawBoundary(r, c, key) {
    const highlighted = isModuleHighlighted(key);
    const color = moduleActivityColor(key);
    ctx.save();
    ctx.fillStyle = highlighted ? alpha(color, c.dark ? .16 : .10) : alpha(c.elevated, .94);
    ctx.strokeStyle = highlighted ? alpha(color, .62) : c.borderSoft;
    ctx.lineWidth = highlighted ? 1.8 : 1.1;
    roundRect(r.x, r.y, r.w, r.h, 18, true, true);
    drawModuleTitle(r, c, key, color);
    ctx.restore();
  }

  function drawModuleTitle(r, c, key, color) {
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.moduleTitle, 900);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';

    const metrics = ctx.measureText(r.title);
    const ascent = metrics.actualBoundingBoxAscent || TYPE.moduleTitle * .72;
    const descent = metrics.actualBoundingBoxDescent || TYPE.moduleTitle * .22;
    const baselineY = r.y + MODULE_TITLE_Y;
    const titleCenterY = baselineY - (ascent - descent) / 2;
    const iconX = r.x + MODULE_TITLE_X;
    const iconY = titleCenterY - MODULE_ICON_SIZE / 2;
    const textX = iconX + MODULE_ICON_SIZE + MODULE_ICON_GAP;
    drawModuleIcon(iconX, iconY, MODULE_ICON_SIZE, moduleIconKind(key, r.title), color, c);

    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.moduleTitle, 900);
    ctx.textAlign = 'left';
    fitText(r.title, textX, baselineY, r.w - (textX - r.x) - MODULE_TITLE_X, 'left');
  }

  function moduleIconKind(key, title) {
    const value = `${key || ''} ${title || ''}`.toLowerCase();
    if (value.includes('sink') || value.includes('ingress')) return 'sink';
    if (value.includes('transaction') || value === 'tx') return 'tx';
    if (value.includes('retina') || value.includes('runtime')) return 'runtime';
    if (value.includes('index')) return 'index';
    if (value.includes('storage')) return 'storage';
    if (value.includes('query')) return 'query';
    return 'default';
  }

  function drawModuleIcon(x, y, size, kind, color, c) {
    const iconColor = moduleIconColor(kind, color);
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size / 24, size / 24);
    ctx.strokeStyle = iconColor;
    ctx.lineWidth = 2.3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.fillStyle = 'transparent';
    if (kind === 'sink') drawSinkIcon(x, y, size, iconColor);
    else if (kind === 'tx') drawTransactionIcon(x, y, size, iconColor);
    else if (kind === 'runtime') drawRuntimeIcon(x, y, size, iconColor);
    else if (kind === 'index') drawIndexIcon(x, y, size, iconColor);
    else if (kind === 'storage') drawStorageIcon(x, y, size, iconColor);
    else if (kind === 'query') drawQueryIcon(x, y, size, iconColor);
    else drawRuntimeIcon(x, y, size, iconColor);
    ctx.restore();
  }

  function moduleIconColor(kind, fallback) {
    if (kind === 'sink') return '#5fb58c';
    if (kind === 'tx') return '#d18a13';
    if (kind === 'runtime') return flow.tx;
    if (kind === 'index') return flow.visibility;
    if (kind === 'storage') return flow.storage;
    if (kind === 'query') return flow.query;
    return fallback || flow.tx;
  }

  function drawSinkIcon() {
    iconRoundRect(4, 4, 6, 6, 1);
    iconRoundRect(14, 4, 6, 6, 1);
    iconRoundRect(4, 14, 6, 6, 1);
    iconRoundRect(14, 14, 6, 6, 1);
  }

  function drawTransactionIcon() {
    ctx.beginPath();
    ctx.arc(12, 12, 7, .45, Math.PI * 1.45);
    ctx.stroke();
    iconLine([[5.7, 15.1], [5, 19], [1.8, 16.6]]);

    ctx.beginPath();
    ctx.arc(12, 12, 7, Math.PI * 1.45, Math.PI * 2.45);
    ctx.stroke();
    iconLine([[18.3, 8.9], [19, 5], [22.2, 7.4]]);

    iconCircle(12, 12, 2.4);
    iconLine([[12, 12], [12, 8.8]]);
    iconLine([[12, 12], [14.5, 13.4]]);
  }

  function drawRuntimeIcon() {
    iconRoundRect(4, 4, 16, 16, 3);
    drawStarPath(12, 12.3, 5, 2.2);
    ctx.stroke();
  }

  function drawStarPath(cx, cy, outerR, innerR) {
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const ang = -Math.PI / 2 + i * Math.PI / 5;
      const r = i % 2 === 0 ? outerR : innerR;
      const px = cx + Math.cos(ang) * r;
      const py = cy + Math.sin(ang) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
  }

  function drawIndexIcon() {
    iconDiamond(12, 5, 8, 3.5);
    iconDiamond(12, 11, 8, 3.5);
    iconDiamond(12, 17, 8, 3.5);
  }

  function drawStorageIcon() {
    ctx.beginPath();
    ctx.ellipse(12, 6, 7, 3, 0, 0, Math.PI * 2);
    ctx.moveTo(5, 6);
    ctx.lineTo(5, 18);
    ctx.ellipse(12, 18, 7, 3, 0, Math.PI, 0, true);
    ctx.lineTo(19, 6);
    ctx.stroke();
    iconArc(12, 12, 7, 3);
  }

  function drawQueryIcon() {
    ctx.beginPath();
    ctx.arc(10.5, 10.5, 5.5, 0, Math.PI * 2);
    ctx.stroke();
    iconLine([[15, 15], [20, 20]]);
  }

  function iconRoundRect(x, y, w, h, r) {
    roundRect(x, y, w, h, r, false, true);
  }

  function iconLine(points) {
    ctx.beginPath();
    points.forEach((point, i) => {
      if (i === 0) ctx.moveTo(point[0], point[1]);
      else ctx.lineTo(point[0], point[1]);
    });
    ctx.stroke();
  }

  function iconCircle(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  function iconDiamond(cx, cy, w, h) {
    ctx.beginPath();
    ctx.moveTo(cx, cy - h);
    ctx.lineTo(cx + w, cy);
    ctx.lineTo(cx, cy + h);
    ctx.lineTo(cx - w, cy);
    ctx.closePath();
    ctx.stroke();
  }

  function iconArc(cx, cy, rx, ry) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI);
    ctx.stroke();
  }

  function isModuleHighlighted(key) {
    if (isHighlighted(key)) return true;
    const st = currentStep();
    const tokenParts = (st.tokens || []).flatMap(t => t.path || []);
    if (key === 'runtime') {
      return false;
    }
    if (key === 'ingress') {
      return tokenParts.some(part => typeof part === 'string' && part.startsWith('ingress.'));
    }
    if (key === 'query') {
      return tokenParts.some(part => typeof part === 'string' && part.startsWith('query.'));
    }
    return false;
  }

  function moduleActivityColor(key) {
    if (key === 'ingress') return flow.cdc;
    if (key === 'query') return flow.query;
    if (key === 'runtime') return currentReplayOperationColor();
    if (key === 'index') return currentIndexOperationColor();
    return flow[key] || flow.replay;
  }

  function currentIndexOperationColor() {
    const text = `${state.scene} ${model && model.index ? model.index.operation : ''} ${model && model.sink ? `${model.sink.requestState} ${model.sink.rpcBatch}` : ''}`;
    if (/delete|DELETE|get pk|old loc/i.test(text)) return flow.delete;
    if (/update|UPDATE|version|prevLoc/i.test(text)) return flow.index;
    if (/insert|INSERT|put pk@290|index insert/i.test(text)) return flow.replay;
    return flow.index;
  }

  function currentReplayOperationColor() {
    const text = `${state.scene} ${model && model.sink ? `${model.sink.requestState} ${model.sink.rpcBatch}` : ''}`;
    if (/delete|DELETE|D:/.test(text)) return flow.delete;
    if (/update|UPDATE|U:/.test(text)) return flow.index;
    if (/insert|INSERT|I:/.test(text)) return flow.replay;
    const st = currentStep();
    const replayToken = st.tokens.find(t => tokenDirection(t, 'sink', 'runtime') || tokenDirection(t, 'sink', 'lane'));
    return replayToken ? replayToken.color : flow.replay;
  }

  function drawStaticFlows(c) {
    const st = currentStep();
    const seen = new Set();
    for (const t of st.tokens) {
      const key = t.path.map(pathKeyPart).join('>');
      if (seen.has(key)) continue;
      seen.add(key);
      drawFlow(t.path, t.color, c, t.arrowLabel || '', .30, 2.2);
    }
  }

  function drawQueryTopFlows(c) {
    if (state.scene !== 'query') return;
    const st = currentStep();
    if (!['queryCreateFilter', 'queryBitmapFilter'].includes(st.anim)) return;
    (st.tokens || []).forEach(t => {
      const path = t.path || [];
      const fromQueryGate = path.includes('queryOverlay.ts') || path.includes('queryOverlay.bitmap');
      const toQueryData = path.some(part => typeof part === 'string' && part.startsWith('queryOverlay.data'));
      if (!fromQueryGate || !toQueryData) return;
      drawFlow(path, t.color, c, t.arrowLabel || '', .48, 2.6);
    });
  }

  function pathKeyPart(part) {
    return Array.isArray(part) ? `${part[0]},${part[1]}` : part;
  }

  function mirrorTxnOps() {
    const raw = model && model.sink && Array.isArray(model.sink.mirrorOps) && model.sink.mirrorOps.length
      ? model.sink.mirrorOps
      : ['insert', 'delete', 'update'];
    return raw.slice(0, 3).map((op, i) => normalizeMirrorOp(op, i));
  }

  function normalizeMirrorOp(op, i) {
    const value = typeof op === 'string' ? op : (op.type || op.label || 'insert');
    const kind = /delete|^d$/i.test(value) ? 'delete' : /update|^u$/i.test(value) ? 'update' : 'insert';
    const spec = {
      insert: { label: 'INSERT', short: 'I', color: flow.replay },
      delete: { label: 'DELETE', short: 'D', color: flow.delete },
      update: { label: 'UPDATE', short: 'U', color: flow.index }
    }[kind];
    return { id: kind, order: i + 1, ...spec };
  }

  function pixelsSinkLayout(r) {
    const pad = MODULE_CONTENT_PAD;
    const top = r.y + MODULE_TITLE_Y + MODULE_CONTENT_GAP;
    const ops = mirrorTxnOps();
    const maxStackCards = 3;
    const cardH = 58;
    const rowH = 64;
    const stackOffsetX = 14;
    const stackOffsetY = 20;
    const stackPadY = 6;
    const stackH = rowH + stackOffsetY * (maxStackCards - 1) + stackPadY * 2;
    const txnH = 50 + cardH + MIRROR_BEGIN_STACK_GAP + stackH + MIRROR_STACK_COMMIT_GAP + cardH + 18;
    const maxTxnH = r.y + r.h - top - MODULE_CONTENT_PAD;
    const txn = { x: r.x + pad, y: top, w: r.w - pad * 2, h: Math.min(maxTxnH, txnH) };
    const begin = { x: txn.x + 28, y: txn.y + 50, w: txn.w - 56, h: cardH };
    const commit = { x: txn.x + 28, y: txn.y + txn.h - cardH - 18, w: txn.w - 56, h: cardH };
    const stack = {
      x: txn.x + 44,
      y: begin.y + begin.h + MIRROR_BEGIN_STACK_GAP,
      w: txn.w - 88,
      h: Math.max(stackH, commit.y - (begin.y + begin.h) - MIRROR_BEGIN_STACK_GAP - MIRROR_STACK_COMMIT_GAP)
    };
    const rowW = MIRROR_ROW_CARD_W;
    const rowStartX = stack.x + (stack.w - (rowW + stackOffsetX * (maxStackCards - 1))) / 2;
    const rows = ops.map((op, i) => ({
      ...op,
      x: rowStartX + i * stackOffsetX,
      y: stack.y + stackPadY + i * stackOffsetY,
      w: rowW,
      h: rowH,
      stackIndex: i
    }));
    const build = { x: txn.x + 18, y: txn.y + 18, w: txn.w - 36, h: 44 };
    const replay = {
      x: stack.x,
      y: stack.y,
      w: stack.w,
      h: stack.h
    };
    const byId = {
      read: build,
      build,
      begin,
      replay,
      commit
    };
    rows.forEach(row => { byId[row.id] = row; });
    return { r, txn, begin, stack, rows, replay, commit, byId };
  }

  function currentPixelsSinkStep() {
    const explicit = model.sink.sinkStep;
    if (['empty', 'read', 'build', 'begin', 'row1', 'row1Ok', 'row2', 'row2Ok', 'row3', 'row3Ok', 'rowsOk', 'replay', 'commit', 'committed'].includes(explicit)) return explicit;
    const text = `${model.sink.requestState} ${model.sink.rpcBatch} ${model.sink.txState}`;
    if (/HWM|commit|OK|pending|eligible/i.test(text)) return 'commit';
    if (/replay|RPC|row/i.test(text)) return 'replay';
    if (/timestamp|begin/i.test(text)) return 'begin';
    if (/mirror tx ready|mirror transaction/i.test(text)) return 'build';
    return null;
  }

  function drawPixelsSink(c) {
    const layout = pixelsSinkLayout(rects.ingress);
    const activeId = currentPixelsSinkStep();

    drawMirrorTransactionPanel(layout, activeId, c);
  }

  function drawMirrorTransactionPanel(layout, activeId, c) {
    const { txn, begin, rows, replay, commit } = layout;
    const active = !!activeId && activeId !== 'empty' && activeId !== 'committed';
    const color = pixelsSinkActivityColor(activeId);
    ctx.fillStyle = alpha(c.panel2, active ? .82 : .72);
    ctx.strokeStyle = active ? alpha(color, .56) : c.borderSoft;
    ctx.lineWidth = active ? 1.4 : 1;
    roundRect(txn.x, txn.y, txn.w, txn.h, 12, true, true);

    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.subTitle, 900);
    ctx.textAlign = 'left';
    fitText(`mirror transaction`, txn.x + PANEL_TITLE_X, txn.y + PANEL_TITLE_Y, txn.w - PANEL_TITLE_X * 2, 'left');
    if (activeId === 'empty') return;

    const visibleRows = visibleMirrorRows(activeId, rows.length);
    const visibleCommit = activeId === 'commit' || activeId === 'committed';
    drawMirrorBeginCard(begin, activeId === 'begin' || activeId === 'build', c);
    rows.slice(0, visibleRows).forEach((row, i) => drawMirrorRowCard(row, rowStageActive(activeId, i), c));
    if (visibleCommit) drawMirrorCommitCard(commit, activeId === 'commit', c);
  }

  function pixelsSinkActivityColor(activeId) {
    if (activeId === 'replay') return currentReplayOperationColor();
    if (activeId === 'row1' || activeId === 'row1Ok') return flow.replay;
    if (activeId === 'row2' || activeId === 'row2Ok') return flow.delete;
    if (activeId === 'row3' || activeId === 'row3Ok') return flow.index;
    return flow.cdc;
  }

  function visibleMirrorRows(activeId, total) {
    if (['replay', 'rowsOk', 'commit', 'committed'].includes(activeId)) return total;
    if (activeId === 'row1' || activeId === 'row1Ok') return Math.min(1, total);
    if (activeId === 'row2' || activeId === 'row2Ok') return Math.min(2, total);
    if (activeId === 'row3' || activeId === 'row3Ok') return Math.min(3, total);
    return 0;
  }

  function rowStageActive(activeId, index) {
    return activeId === 'build' || activeId === 'replay' || activeId === `row${index + 1}`;
  }

  function drawMirrorBeginCard(box, active, c) {
    drawCdcCard(box.x, box.y, box.w, box.h, flow.cdc, active, c);
    ctx.fillStyle = flow.cdc;
    ctx.font = typeFont(TYPE.text, 900);
    ctx.textAlign = 'left';
    ctx.fillText('BEGIN', box.x + 18, box.y + 29);
    const tsLabel = mirrorBeginTimestampLabel();
    const tsAlpha = mirrorBeginTimestampAlpha();
    if (tsLabel && tsAlpha > 0) {
      ctx.save();
      ctx.globalAlpha *= tsAlpha;
      ctx.fillStyle = c.text;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'right';
      fitText(tsLabel, box.x + box.w - 82, box.y + 31, 64, 'right');
      ctx.restore();
    }
  }

  function mirrorBeginTimestampLabel() {
    const text = String(model.sink.txState || '');
    const match = text.match(/\b(?:timestamp|ts)\s*=\s*(\d{1,4})\b/i);
    if (!match) return '';
    return `ts=${match[1]}`;
  }

  function mirrorBeginTimestampAlpha() {
    if (currentPixelsSinkStep() !== 'begin') return 1;
    const p = stepProgress();
    if (p < MIRROR_BEGIN_TS_REPLY_END) return 0;
    return ease(clamp((p - MIRROR_BEGIN_TS_REPLY_END) / (MIRROR_BEGIN_TS_FADE_END - MIRROR_BEGIN_TS_REPLY_END), 0, 1));
  }

  function drawMirrorRowCard(row, active, c) {
    ctx.save();
    ctx.shadowColor = alpha(row.color, active ? .22 : .12);
    ctx.shadowBlur = active ? 10 : 6;
    ctx.shadowOffsetY = active ? 4 : 2;
    drawCdcCard(row.x, row.y, row.w, row.h, row.color, active, c, { opaque: true });
    ctx.shadowColor = 'transparent';
    drawRowGlyph(row.x + 14, row.y + 22, row.color, false, c);
    ctx.fillStyle = alpha(row.color, active ? .24 : .12);
    ctx.strokeStyle = alpha(row.color, active ? .58 : .30);
    ctx.lineWidth = 1;
    roundRect(row.x + 32, row.y + 17, 24, 24, 8, true, true);
    ctx.fillStyle = row.color;
    ctx.font = typeFont(TYPE.text, 900);
    ctx.textAlign = 'center';
    ctx.fillText(String(row.order), row.x + 44, row.y + 33);
    ctx.fillStyle = row.color;
    ctx.font = typeFont(TYPE.text, 900);
    ctx.textAlign = 'left';
    ctx.fillText(row.label, row.x + 66, row.y + 29);
    drawLogStripes(row.x + 66, row.y + 42, 76, 10, row.color, c);
    ctx.restore();
  }

  function drawMirrorCommitCard(box, active, c) {
    drawCdcCard(box.x, box.y, box.w, box.h, flow.cdc, active, c);
    ctx.fillStyle = flow.cdc;
    ctx.font = typeFont(TYPE.text, 900);
    ctx.textAlign = 'left';
    ctx.fillText('COMMIT', box.x + 18, box.y + 30);
  }

  function drawCdcCard(x, y, w, h, color, active, c, opts = {}) {
    ctx.fillStyle = opts.opaque ? c.panel : active ? alpha(color, c.dark ? .18 : .11) : alpha(c.panel2, .70);
    ctx.strokeStyle = active ? alpha(color, .62) : c.borderSoft;
    ctx.lineWidth = active ? 1.6 : 1;
    roundRect(x, y, w, h, 8, true, true);
  }

  function drawLogStripes(x, y, w, h, color, c) {
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = alpha(color, .18 + i * .04);
      roundRect(x + i * 13, y + i % 2, 10, h - 2, 3, true, false);
    }
    ctx.strokeStyle = alpha(color, .28);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y + h + 4);
    ctx.lineTo(x + w, y + h + 4);
    ctx.stroke();
  }

  function drawRowGlyph(x, y, color, empty, c) {
    ctx.strokeStyle = empty ? alpha(c.muted, .52) : alpha(color, .62);
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      ctx.moveTo(x, y - 7 + i * 6);
      ctx.lineTo(x + 9, y - 7 + i * 6);
    }
    ctx.stroke();
    if (empty) {
      ctx.strokeStyle = alpha(flow.delete, .70);
      ctx.beginPath();
      ctx.moveTo(x, y - 7);
      ctx.lineTo(x + 9, y + 5);
      ctx.moveTo(x + 9, y - 7);
      ctx.lineTo(x, y + 5);
      ctx.stroke();
    }
  }

  function tokenDirection(token, fromPrefix, toPrefix) {
    const from = tokenPrefixIndex(token, fromPrefix);
    const to = tokenPrefixIndex(token, toPrefix);
    return from >= 0 && to >= 0 && from < to;
  }

  function tokenPrefixIndex(token, prefix) {
    return token.path.findIndex(part => typeof part === 'string' && part.startsWith(prefix));
  }

  function txWindowLayout(r) {
    const y = r.y + MODULE_TITLE_Y + MODULE_CONTENT_GAP;
    const h = r.y + r.h - y - MODULE_CONTENT_PAD;
    return {
      x: r.x + MODULE_CONTENT_PAD,
      y,
      w: r.w - MODULE_CONTENT_PAD * 2,
      h
    };
  }

  function drawTransactionService(c) {
    const r = rects.tx;
    drawComponent(r, c, { color: flow.tx, key: 'tx' });

    const { x, y, w, h } = txWindowLayout(r);

    drawTxWindow(x, y, w, h, c);
  }

  function drawTxWindow(x, y, w, h, c) {
    ctx.fillStyle = alpha(c.panel2, .72);
    ctx.strokeStyle = c.borderSoft;
    roundRect(x, y, w, h, 9, true, true);
    const min = TX_WINDOW_MIN_TS;
    const max = TX_WINDOW_MAX_TS;
    const lx = map(model.tx.lwm, min, max, x + 18, x + w - 18);
    const hx = map(model.tx.hwm, min, max, x + 18, x + w - 18);
    const lineY = y + h / 2;
    ctx.strokeStyle = alpha(c.border, .56);
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(x + 18, lineY); ctx.lineTo(x + w - 18, lineY); ctx.stroke();
    ctx.strokeStyle = alpha(flow.visibility, .58);
    ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(lx, lineY); ctx.lineTo(hx, lineY); ctx.stroke();
    marker(lx, lineY, `LWM ${model.tx.lwm}`, flow.gc, c, 'top');
    marker(hx, lineY, `HWM ${model.tx.hwm}`, flow.tx, c, 'bottom');
  }

  function marker(x, y, label, color, c, labelSide = 'top') {
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x, y - 16); ctx.lineTo(x, y + 16); ctx.stroke();
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 900);
    ctx.textAlign = 'center';
    ctx.fillText(label, x, labelSide === 'bottom' ? y + 30 : y - 20);
  }

  function drawIndex(c) {
    const r = rects.index;
    drawComponent(r, c, { color: moduleActivityColor('index'), key: 'indexService' });

    const x = r.x + MODULE_CONTENT_PAD;
    const y = r.y + MODULE_TITLE_Y + MODULE_CONTENT_GAP;
    const w = r.w - MODULE_CONTENT_PAD * 2;
    const h = r.y + r.h - y - MODULE_CONTENT_PAD;
    const gap = 10;
    const primaryFixedW = INDEX_MAP_CELL_PAD * 2 + INDEX_PRIMARY_KEY_W + INDEX_PRIMARY_VALUE_W + INDEX_MAP_ARROW_GAP * 2;
    const mainFixedW = INDEX_MAP_CELL_PAD * 2 + INDEX_MAIN_KEY_W + INDEX_MAIN_VALUE_W + INDEX_MAP_ARROW_GAP * 2;
    const mapW = (w - gap + primaryFixedW - mainFixedW) / 2;
    const locationW = w - mapW - gap;
    const primaryRows = parseIndexPairs(model.index.primaryEntries);
    const locationRows = parseIndexPairs(model.index.mainEntries);
    const mapActive = isIndexInteractionActive();

    drawPrimaryIndexMap(x, y, mapW, h, primaryRows, c, mapActive);
    drawMainIndexMap(x + mapW + gap, y, locationW, h, primaryRows, locationRows, c, mapActive);
  }

  function drawPrimaryIndexMap(x, y, w, h, rows, c, active) {
    const color = flow.index;
    ctx.fillStyle = active ? alpha(c.panel3, .88) : alpha(c.panel2, .78);
    ctx.strokeStyle = active ? c.border : c.borderSoft;
    ctx.lineWidth = active ? 1.4 : 1;
    roundRect(x, y, w, h, 9, true, true);

    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    fitText('primary index', x + INDEX_MAP_TITLE_X, y + INDEX_MAP_TITLE_Y, w - INDEX_MAP_TITLE_X * 2, 'left');

    const visibleRows = rows.slice(0, 2);
    const rowCount = Math.max(visibleRows.length, 1);
    const rowH = 24;
    const top = y + INDEX_MAP_TITLE_Y + 16;
    const bottom = y + h - 16 - rowH;
    const keyX = x + INDEX_MAP_CELL_PAD;
    const keyW = INDEX_PRIMARY_KEY_W;

    visibleRows.forEach((row, i) => {
      const yy = rowCount === 1 ? top : top + i * ((bottom - top) / (rowCount - 1));
      const rowColor = indexPrimaryRowHighlight(row);
      const rowAlpha = indexRowRevealAlpha(rowColor);
      ctx.save();
      ctx.globalAlpha *= rowAlpha;
      drawIndexKeyCard(keyX, yy, keyW, rowH, compactPrimaryKey(row.from), color, c, active, rowColor);
      const valueW = INDEX_PRIMARY_VALUE_W;
      const valueX = x + w - INDEX_MAP_CELL_PAD - valueW;
      drawIndexValueCard(valueX, yy, valueW, rowH, compactRowId(row.to), color, c, active, rowColor);

      const a = { x: keyX + keyW + INDEX_MAP_ARROW_GAP, y: yy + 12 };
      const b = { x: valueX - INDEX_MAP_ARROW_GAP, y: yy + 12 };
      ctx.strokeStyle = active ? c.border : c.borderSoft;
      ctx.lineWidth = 1.6;
      drawPolyline([a, b]);
      arrowHead(a, b, active ? c.border : c.borderSoft);
      ctx.restore();
    });
  }

  function drawMainIndexMap(x, y, w, h, primaryRows, locationRows, c, active) {
    const color = flow.storage;
    ctx.fillStyle = active ? alpha(c.panel3, .88) : alpha(c.panel2, .78);
    ctx.strokeStyle = active ? c.border : c.borderSoft;
    ctx.lineWidth = active ? 1.4 : 1;
    roundRect(x, y, w, h, 9, true, true);

    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    fitText('main index', x + INDEX_MAP_TITLE_X, y + INDEX_MAP_TITLE_Y, w - INDEX_MAP_TITLE_X * 2, 'left');

    const matchedLocations = primaryRows
      .slice(0, 2)
      .map(row => locationRows.find(loc => loc.from === row.to))
      .filter(Boolean);
    const visibleLocations = (matchedLocations.length ? matchedLocations : locationRows.slice(0, 2)).slice(0, 2);

    visibleLocations.forEach((loc, i) => {
      const rowCount = Math.max(visibleLocations.length, 1);
      const rowH = 24;
      const top = y + INDEX_MAP_TITLE_Y + 16;
      const bottom = y + h - 16 - rowH;
      const yy = rowCount === 1 ? top : top + i * ((bottom - top) / (rowCount - 1));
      const rowW = INDEX_MAIN_KEY_W;
      const valW = INDEX_MAIN_VALUE_W;
      const valX = x + w - INDEX_MAP_CELL_PAD - valW;
      const midY = yy + 12;

      const keyX = x + INDEX_MAP_CELL_PAD;
      const rowColor = indexMainRowHighlight(loc);
      const rowAlpha = indexRowRevealAlpha(rowColor);
      ctx.save();
      ctx.globalAlpha *= rowAlpha;
      drawIndexKeyCard(keyX, yy, rowW, rowH, compactRowId(loc.from), color, c, active, rowColor);

      const a = { x: keyX + rowW + INDEX_MAP_ARROW_GAP, y: midY };
      const b = { x: valX - INDEX_MAP_ARROW_GAP, y: midY };
      ctx.strokeStyle = active ? c.border : c.borderSoft;
      ctx.lineWidth = 1.3;
      drawPolyline([a, b]);
      arrowHead(a, b, active ? c.border : c.borderSoft);

      drawRowLocationTuple(valX, yy, valW, rowH, loc.to, color, c, active, rowColor);
      ctx.restore();
    });
  }

  function indexPrimaryRowHighlight(row) {
    if (!isIndexInteractionActive()) return null;
    const op = model.index.operation || '';
    if (/(insert entry|insert OK|put version|update index OK)/i.test(op) && /@(290|292)$/.test(row.from)) return flow.replay;
    if (/delete index entry/i.test(op) && indexPrimaryDeleteTarget(row, op)) return flow.delete;
    if (/(get pk|old loc|RowLocation|resolve before key)/i.test(op) && indexPrimaryLookupTarget(row, op)) return flow.gc;
    return null;
  }

  function indexMainRowHighlight(row) {
    if (!isIndexInteractionActive()) return null;
    const op = model.index.operation || '';
    if (/(insert entry|insert OK|put version|update index OK)/i.test(op) && row.from === 'rowId821') return flow.replay;
    if (/delete index entry/i.test(op) && indexMainDeleteTarget(row, op)) return flow.delete;
    if (/(get pk|old loc|RowLocation|resolve before key)/i.test(op) && indexMainLookupTarget(row, op)) return flow.gc;
    return null;
  }

  function indexPrimaryLookupTarget(row, op) {
    return /pk@290/i.test(op) ? /@290$/.test(row.from) : /@212$/.test(row.from);
  }

  function indexMainLookupTarget(row, op) {
    return /pk@290/i.test(op) ? row.from === 'rowId821' : row.from === 'rowId820';
  }

  function indexPrimaryDeleteTarget(row, op) {
    return /pk@290/i.test(op) ? /@290$/.test(row.from) : /@212$/.test(row.from);
  }

  function indexMainDeleteTarget(row, op) {
    return /pk@290/i.test(op) ? row.from === 'rowId821' : row.from === 'rowId820';
  }

  function isIndexInteractionActive() {
    return state.detailFocus === 'index' || isHighlighted('index');
  }

  function indexRowRevealAlpha(highlightColor) {
    if (!highlightColor) return 1;
    const op = model.index.operation || '';
    if (/delete index entry .*applied|delete index entry applied/i.test(op)) {
      const t = ease(clamp(stepProgress() / .82, 0, 1));
      return lerp(1, .08, t);
    }
    if (!/(insert entry applied|put version .* applied)/i.test(op)) return 1;
    const t = ease(clamp(stepProgress() / .72, 0, 1));
    return lerp(.18, 1, t);
  }

  function drawRowLocationTuple(x, y, w, h, location, color, c, active, highlightColor = null) {
    ctx.fillStyle = highlightColor ? alpha(highlightColor, .22) : active ? alpha(c.panel3, .88) : alpha(c.panel2, .78);
    ctx.strokeStyle = highlightColor ? alpha(highlightColor, .56) : active ? c.border : c.borderSoft;
    ctx.lineWidth = active ? 1.2 : 1;
    roundRect(x, y, w, h, 5, true, true);

    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text);
    fitText(String(location || '').replace('.pxl', ''), x + 5, y + 16, w - 10, 'center');
  }

  function drawIndexKeyCard(x, y, w, h, label, color, c, active, highlightColor = null) {
    ctx.fillStyle = highlightColor ? alpha(highlightColor, .22) : active ? alpha(c.panel3, .88) : alpha(c.panel2, .78);
    ctx.strokeStyle = highlightColor ? alpha(highlightColor, .56) : active ? c.border : c.borderSoft;
    ctx.lineWidth = active ? 1.3 : 1;
    roundRect(x, y, w, h, 5, true, true);

    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text);
    fitText(label, x + 4, y + 16, w - 8, 'center');
  }

  function drawIndexValueCard(x, y, w, h, label, color, c, active, highlightColor = null) {
    ctx.fillStyle = highlightColor ? alpha(highlightColor, .22) : active ? alpha(c.panel3, .88) : alpha(c.panel2, .78);
    ctx.strokeStyle = highlightColor ? alpha(highlightColor, .56) : active ? c.border : c.borderSoft;
    ctx.lineWidth = active ? 1.3 : 1;
    roundRect(x, y, w, h, 5, true, true);

    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text);
    fitText(label, x + 4, y + 16, w - 8, 'center');
  }

  function parseIndexPairs(rows) {
    return (rows || [])
      .map(s => {
        const parts = String(s).split('->');
        return {
          from: (parts[0] || '').trim(),
          to: (parts[1] || '').trim()
        };
      })
      .filter(row => row.from && row.to);
  }

  function compactRowId(rowId) {
    return String(rowId || '').replace(/^rowId/, 'r');
  }

  function compactPrimaryKey(key) {
    return String(key || '');
  }

  function drawReplayers(c) {
    drawReplayerInternals(c);
  }

  function replayerPanelLayout() {
    const r = rects.runtime;
    const pad = MODULE_CONTENT_PAD;
    const y = r.y + MODULE_TITLE_Y + MODULE_CONTENT_GAP;
    const frame = { x: r.x + pad, y, w: r.w - pad * 2, h: r.y + r.h - y - MODULE_CONTENT_PAD };
    const gap = 20;
    const writeH = Math.round((frame.h - gap) * .45);
    const visibilityH = frame.h - gap - writeH;
    return {
      frame,
      write: { x: frame.x, y: frame.y, w: frame.w, h: writeH },
      visibility: { x: frame.x, y: frame.y + writeH + gap, w: frame.w, h: visibilityH }
    };
  }

  function replayWriteBufferLayout(x, y, w, h) {
    const top = y + 50;
    const bottom = y + h - MODULE_CONTENT_PAD;
    const panelH = Math.max(72, bottom - top);
    const gap = 28;
    const innerPad = MODULE_CONTENT_PAD;
    const activePanelW = 84;
    const activePanel = { x: x + innerPad, y: top, w: activePanelW, h: panelH };
    const queueX = activePanel.x + activePanel.w + gap;
    const queue = { x: queueX, y: top, w: x + w - innerPad - queueX, h: panelH };
    const maxVisible = 3;
    const itemGap = 12;
    const memW = Math.max(42, Math.min(78, (queue.w - 18 - itemGap * (maxVisible - 1)) / maxVisible));
    const memY = top + 28;
    const memH = Math.max(36, panelH - 36);
    const activeMem = { x: activePanel.x + (activePanel.w - memW) / 2, y: memY, w: memW, h: memH };
    const fillPadX = 10;
    const fillPadTop = 4;
    const fillPadBottom = 6;
    const fullFill = {
      x: activeMem.x + fillPadX,
      y: activeMem.y + fillPadTop,
      w: activeMem.w - fillPadX * 2,
      h: activeMem.h - fillPadTop - fillPadBottom
    };
    return { activePanel, queue, activeMem, fullFill, memW: fullFill.w, memY: fullFill.y, memH: fullFill.h, itemGap };
  }

  function retinaMemtableMetrics() {
    const { write } = replayerPanelLayout();
    const layout = replayWriteBufferLayout(write.x, write.y, write.w, write.h);
    return {
      w: layout.memW,
      h: layout.memH,
      queueH: layout.queue.h,
      itemGap: layout.itemGap
    };
  }

  function replayVisibilityLayout(x, y, w, h) {
    const rowX = x + 20;
    const rowY = y + 46;
    const rowW = w - 32;
    const labelW = Math.floor(rowW * 0.31);
    const bitmapX = rowX + labelW;
    const bitmapW = rowW - labelW;
    const chainY = y + 88;
    const maxChainH = Math.max(40, y + h - MODULE_CONTENT_PAD - chainY);
    const chainH = Math.max(44, maxChainH);
    return { rowX, rowY, rowW, labelW, bitmapX, bitmapW, chainY, chainH };
  }

  function activeReplayLane() {
    const st = currentStep();
    const parts = [];
    (st.highlights || []).forEach(h => parts.push(h));
    (st.tokens || []).forEach(t => (t.path || []).forEach(p => {
      if (typeof p === 'string') parts.push(p);
    }));
    for (const part of parts) {
      const m = /^lane([0-2])/.exec(part);
      if (m) return model.lanes[Number(m[1])] || model.lanes[DETAIL_REPLAY_ID];
    }
    return model.lanes[DETAIL_REPLAY_ID];
  }

  function drawReplayerInternals(c) {
    const { write, visibility } = replayerPanelLayout();
    const lane = activeReplayLane();
    drawReplayWriteBuffer(write.x, write.y, write.w, write.h, lane, c);
    drawReplayVisibility(visibility.x, visibility.y, visibility.w, visibility.h, lane, c);
  }

  function drawNeutralPanelBox(x, y, w, h, title, c, radius = 9, active = false) {
    ctx.fillStyle = active ? alpha(c.panel3, .88) : alpha(c.panel2, .78);
    ctx.strokeStyle = active ? c.border : c.borderSoft;
    ctx.lineWidth = active ? 1.4 : 1;
    roundRect(x, y, w, h, radius, true, true);
    if (!title) return;
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.subTitle, 900);
    ctx.textAlign = 'left';
    fitText(title, x + PANEL_TITLE_X, y + PANEL_TITLE_Y, w - PANEL_TITLE_X * 2, 'left');
  }

  function drawReplayWriteBuffer(x, y, w, h, lane, c) {
    const writeActive = state.detailFocus === 'writeBuffer' || lane.highlight === 'active' || lane.highlight === 'immutable';
    drawNeutralPanelBox(x, y, w, h, 'write buffer', c, 9, writeActive);
    const st = currentStep();
    const p = stepProgress(true);
    const layout = replayWriteBufferLayout(x, y, w, h);
    const { activePanel, queue, activeMem } = layout;
    const prevRows = lane.prevActiveRows ?? lane.activeRows;
    const displayRows = lerp(prevRows, lane.activeRows, p);
    const fillH = layout.fullFill.h * clamp(displayRows / lane.activeCap, 0, 1);

    drawNeutralPanelBox(activePanel.x, activePanel.y, activePanel.w, activePanel.h, '', c, 6, lane.highlight === 'active');
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    ctx.fillText('active', activePanel.x + 8, activePanel.y + 18);

    ctx.fillStyle = alpha(flow.replay, .34);
    roundRect(layout.fullFill.x, layout.fullFill.y + layout.fullFill.h - fillH, layout.fullFill.w, Math.max(5, fillH), 5, true, false);
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'center';
    ctx.fillText(`${Math.round(displayRows)}/${lane.activeCap}`, activeMem.x + activeMem.w / 2, activeMem.y + activeMem.h - 14);

    const sealMoving = st.anim === 'seal' && p < 1;
    const flushMoving = st.anim === 'flush' && p < 1 && lane.prevImmutable > 0;
    const visibleImmutable = sealMoving || flushMoving ? lane.prevImmutable : lane.immutable;
    const queueCount = flushMoving ? 0 : visibleImmutable;
    drawCompactImmQueue(layout, queueCount, lane.highlight === 'immutable', c, { suppressEmpty: sealMoving || flushMoving });

    if (st.anim === 'seal' && p < 1) {
      const targetX = firstImmutableMemX(layout, lane.prevImmutable + 1);
      const ghostX = lerp(layout.fullFill.x, targetX, p);
      ctx.save();
      ctx.globalAlpha = Math.min(1, p * 3) * .85;
      ctx.fillStyle = alpha(flow.gc, .26);
      ctx.strokeStyle = alpha(flow.gc, .62);
      roundRect(ghostX, layout.fullFill.y, layout.fullFill.w, layout.fullFill.h, 6, true, true);
      ctx.restore();
    }

  }

  function firstImmutableMemX(layout, count) {
    const { queue, memW, itemGap } = layout;
    const n = Math.max(1, Math.min(count, 3));
    const totalW = memW * n + itemGap * (n - 1);
    return queue.x + Math.max(9, (queue.w - totalW) / 2);
  }

  function drawCompactImmQueue(layout, count, active, c, opts = {}) {
    const { queue, memW, memY, memH, itemGap } = layout;
    const color = flow.gc;
    drawNeutralPanelBox(queue.x, queue.y, queue.w, queue.h, '', c, 6, active);
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    ctx.fillText('immut queue', queue.x + 8, queue.y + 18);
    const n = Math.min(count, 3);
    if (count <= 0) {
      if (opts.suppressEmpty) return;
      ctx.fillStyle = c.muted;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'center';
      ctx.fillText('empty', queue.x + queue.w / 2, queue.y + queue.h / 2 + 6);
      return;
    }
    const startX = firstImmutableMemX(layout, count);
    for (let i = 0; i < n; i++) {
      const bx = startX + i * (memW + itemGap);
      const label = count > 3 && i === n - 1 ? `+${count - 2}` : `b${count - i}`;
      ctx.fillStyle = alpha(color, active ? .22 : .12);
      ctx.strokeStyle = alpha(color, active ? .56 : .28);
      roundRect(bx, memY, memW, memH, 5, true, true);
      ctx.fillStyle = c.text;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'center';
      fitText(label, bx + 3, memY + memH / 2 + 5, memW - 6, 'center');
    }
  }

  function drawAsyncFlushMemtable(c) {
    const st = currentStep();
    if (st.anim !== 'flush') return;
    const p = stepProgress(true);
    if (p >= 1) return;
    const lane = activeReplayLane();
    if ((lane.prevImmutable || 0) <= 0) return;
    const { write } = replayerPanelLayout();
    const layout = replayWriteBufferLayout(write.x, write.y, write.w, write.h);
    const startX = firstImmutableMemX(layout, lane.prevImmutable);
    const start = { x: startX + layout.memW / 2, y: layout.memY + layout.memH / 2 };
    const end = point('storage.memtable');
    const x = lerp(start.x, end.x, p);
    const y = lerp(start.y, end.y, p);

    ctx.save();
    ctx.fillStyle = alpha(flow.storage, .22);
    ctx.strokeStyle = alpha(flow.storage, .62);
    ctx.lineWidth = 1.4;
    roundRect(x - layout.memW / 2, y - layout.memH / 2, layout.memW, layout.memH, 5, true, true);
    ctx.restore();
  }

  function drawReplayVisibility(x, y, w, h, lane, c) {
    const appendSettled = currentStep().anim === 'appendDeleteTs' && stepProgress() >= .82;
    const visibilityActive = state.detailFocus === 'visibility' || state.detailFocus === 'gc' ||
      (lane.highlight === 'visibility' && !appendSettled) || lane.highlight === 'baseTs' || lane.highlight === 'baseBitmap' || lane.highlight === 'foldEligible';
    drawNeutralPanelBox(x, y, w, h, 'visibility structure', c, 9, visibilityActive);

    const layout = replayVisibilityLayout(x, y, w, h);
    const { rowX, rowY, labelW, bitmapX, bitmapW, chainY, chainH } = layout;

    drawBaseTsLabel(lane, rowX, rowY + 14, labelW - 4, c);
    drawFixedDeleteBitmap(lane, bitmapX, rowY, bitmapW, c);

    const chainX = x + MODULE_CONTENT_PAD;
    const chainW = w - MODULE_CONTENT_PAD * 2;
    const chainPad = 8;
    const itemPad = 20;
    const queryBitmapPhase = state.scene === 'query' &&
      ['queryBitmapBase', 'queryBitmapCheck', 'queryBitmapFold', 'queryBitmapMove'].includes(currentStep().anim);
    const chainActive = visibilityActive && !queryBitmapPhase;
    ctx.fillStyle = chainActive ? alpha(flow.visibility, .10) : alpha(c.panel2, .78);
    ctx.strokeStyle = chainActive ? alpha(flow.visibility, .48) : c.borderSoft;
    ctx.lineWidth = chainActive ? 1.4 : 1;
    roundRect(chainX, chainY, chainW, chainH, 7, true, true);
    ctx.fillStyle = c.text;
    ctx.font = typeFont(TYPE.text, 800);
    ctx.textAlign = 'left';
    ctx.fillText('delete ts chain', chainX + chainPad, chainY + 22);
    const itemsY = chainY + 34;
    drawCompactDeleteTsItems(chainX + itemPad, itemsY, chainW - itemPad * 2, lane, c);
    drawFoldingDeleteTsItems(chainX + itemPad, itemsY, chainW - itemPad * 2, bitmapX, rowY, bitmapW, lane, c);
    drawDeleteTsConditionPill(chainX + itemPad, itemsY, chainW - itemPad * 2, lane, c);
    drawQueryDeleteTsConditionPill(chainX + itemPad, itemsY, chainW - itemPad * 2, c);
  }

  function drawBaseTsLabel(lane, x, y, w, c) {
    const foldActive = currentStep().anim === 'foldDeleteTs';
    const queryBaseTsActive = state.scene === 'query' && currentStep().anim === 'queryBitmapBase';
    const p = stepProgress();
    const showUpdatedBaseTs = !foldActive || p >= .72;
    const labelTs = showUpdatedBaseTs ? lane.baseTs : lane.prevBaseTs;
    const highlighted = foldActive && showUpdatedBaseTs;
    const text = `baseTs=${labelTs}`;
    ctx.save();
    ctx.font = typeFont(TYPE.text, 900);
    ctx.textAlign = 'left';
    if (queryBaseTsActive) {
      ctx.fillStyle = c.text;
      fitText(text, x, y, w, 'left');
      const flashWindow = .56;
      let flash = 0;
      if (p < flashWindow) {
        const cycle = (p / flashWindow) * 2;
        const local = cycle % 1;
        flash = local < .68 ? 1 : 1 - ease(clamp((local - .68) / .32, 0, 1));
      }
      if (flash > 0) {
        ctx.globalAlpha *= flash;
        ctx.fillStyle = flow.gc;
        fitText(text, x, y, w, 'left');
      }
      ctx.restore();
      return;
    }
    ctx.fillStyle = highlighted ? flow.gc : c.text;
    if (foldActive && showUpdatedBaseTs) ctx.globalAlpha *= lerp(.72, 1, ease(clamp((p - .72) / .18, 0, 1)));
    fitText(text, x, y, w, 'left');
    ctx.restore();
  }

  function drawDeleteTsConditionPill(x, y, w, lane, c) {
    if (lane.highlight !== 'foldEligible') return;
    const p = stepProgress();
    if (p < .12) return;
    const a = ease(clamp((p - .12) / .28, 0, 1));
    if (a <= 0) return;
    const box = deleteTsConditionPillBox(x, y, w);
    ctx.save();
    ctx.globalAlpha *= a;
    drawPill(box.x, box.y, box.w, box.h, 'ts <= safeTs', flow.visibility, c, true, 8);
    ctx.restore();
  }

  function drawQueryDeleteTsConditionPill(x, y, w, c) {
    const st = currentStep();
    if (state.scene !== 'query' || st.anim !== 'queryBitmapCheck') return;
    const p = stepProgress();
    const a = ease(clamp((p - .12) / .28, 0, 1));
    if (a <= 0) return;
    const box = deleteTsConditionPillBox(x, y, w);
    ctx.save();
    ctx.globalAlpha *= a;
    drawPill(box.x, box.y, box.w, box.h, 'ts <= queryTs', flow.visibility, c, true, 8);
    ctx.restore();
  }

  function deleteTsConditionPillBox(x, y, w) {
    const layout = deleteTsItemLayout(w);
    const col = 2;
    const pillW = layout.itemW * 2 + layout.gapX;
    return {
      x: x + col * (layout.itemW + layout.gapX),
      y: y + layout.itemH + layout.rowGap + 4,
      w: pillW,
      h: 24
    };
  }

  function drawFixedDeleteBitmap(lane, x, y, w, c) {
    const len = 16;
    const foldActive = currentStep().anim === 'foldDeleteTs';
    const foldP = stepProgress();
    const showFoldedBits = !foldActive || foldP >= .72;
    const bits = ((showFoldedBits ? lane.baseBitmap : lane.prevBaseBitmap) || '').padEnd(len, '0').slice(0, len);
    const pendingDeletes = new Set();
    const eligibleDeletes = new Set();
    const newlyFolded = new Set();

    const bitmapDeleteTs = lane.bitmapDeleteTs || lane.deleteTs;
    bitmapDeleteTs.forEach(item => {
      const offset = deleteOffsetValue(item);
      if (!Number.isFinite(offset) || offset < 0 || offset >= len) return;
      pendingDeletes.add(offset);
    });
    lane.deleteTs.forEach(item => {
      const offset = deleteOffsetValue(item);
      if (!Number.isFinite(offset) || offset < 0 || offset >= len) return;
      if (lane.safeTs != null && deleteTsValue(item) <= lane.safeTs) {
        eligibleDeletes.add(offset);
      }
    });
    if (foldActive) {
      (lane.prevDeleteTs || []).forEach(item => {
        const offset = foldBitmapOffsetValue(item, lane);
        if (Number.isFinite(offset) && offset >= 0 && offset < len && lane.safeTs != null && deleteTsValue(item) <= lane.safeTs) {
          newlyFolded.add(offset);
        }
      });
    }

    for (let i = 0; i < len; i++) {
      const folded = bits[i] === '1';
      const eligible = eligibleDeletes.has(i);
      const pending = pendingDeletes.has(i);
      const justFolded = newlyFolded.has(i);
      let fill = alpha(c.border, .22);
      let stroke = alpha(c.border, .56);

      if (folded) {
        const color = justFolded ? flow.gc : flow.delete;
        const foldedAlpha = justFolded ? lerp(.28, .72, ease(clamp((foldP - .72) / .18, 0, 1))) : .62;
        fill = justFolded ? alpha(color, foldedAlpha) : alpha(flow.delete, .46);
        stroke = justFolded ? alpha(color, .88) : alpha(flow.delete, .70);
      } else if (pending) {
        fill = alpha(flow.delete, .46);
        stroke = alpha(flow.delete, .70);
      }

      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = folded || pending ? (justFolded ? 1.8 : 1.2) : 1;
      const cell = bitmapCellRect(x, y, w, i);
      roundRect(cell.x, cell.y, cell.w, cell.h, 2.5, true, true);
    }
  }

  function bitmapCellMetrics(x, w, len = 16) {
    const gap = 3;
    const cellW = Math.max(7, Math.min(12, Math.floor((w - gap * (len - 1)) / len)));
    const cellH = 18;
    const totalW = len * cellW + (len - 1) * gap;
    const startX = x + Math.max(0, (w - totalW) / 2);
    return { gap, cellW, cellH, startX };
  }

  function bitmapCellRect(x, y, w, index) {
    const m = bitmapCellMetrics(x, w);
    return { x: m.startX + index * (m.cellW + m.gap), y, w: m.cellW, h: m.cellH };
  }

  function drawCompactDeleteTsItems(x, y, w, lane, c) {
    const columns = 4;
    const rows = 2;
    const st = currentStep();
    const hideAppendingItem = st.anim === 'appendDeleteTs' && stepProgress() < .82;
    const appendSettled = st.anim === 'appendDeleteTs' && stepProgress() >= .82;
    const foldingDeleteTs = st.anim === 'foldDeleteTs' && stepProgress() < .82;
    const items = foldingDeleteTs ? (lane.prevDeleteTs || lane.deleteTs) : hideAppendingItem ? lane.deleteTs.slice(0, -1) : lane.deleteTs;
    const visible = items.slice(0, columns * rows);
    const itemW = Math.min(90, Math.floor((w - 6 * (columns - 1)) / columns));
    const gapX = columns > 1 ? (w - itemW * columns) / (columns - 1) : 0;
    const itemH = 24;
    const rowGap = 10;
    visible.forEach((item, i) => {
      const col = i % columns;
      const row = Math.floor(i / columns);
      const ts = deleteTsValue(item);
      const eligible = lane.safeTs != null && ts <= lane.safeTs;
      const queryEligible = queryDeleteTsHighlightReady() && ts <= model.query.transTs;
      const gcActive = foldEligibleHighlightReady() && lane.highlight === 'foldEligible' && eligible;
      const queryFoldItemActive = st.anim !== 'queryBitmapFold' || stepProgress() < .88;
      const queryActive = queryEligible && ['queryBitmapCheck', 'queryBitmapFold'].includes(st.anim) && queryFoldItemActive;
      const foldingEligible = foldingDeleteTs && eligible;
      const queryFoldingEligible = st.anim === 'queryBitmapFold' && stepProgress() < .88 && queryActive;
      if (foldingEligible || queryFoldingEligible) return;
      const appendVisible = st.anim !== 'appendDeleteTs' || !hideAppendingItem;
      const active = gcActive || queryActive || foldingEligible || (lane.highlight === 'visibility' && appendVisible && !appendSettled && i === visible.length - 1);
      const color = gcActive || queryActive || foldingEligible ? flow.gc : active || st.anim === 'appendDeleteTs' ? flow.delete : c.border;
      const itemX = x + col * (itemW + gapX);
      const itemY = y + row * (itemH + rowGap);
      drawPill(itemX, itemY, itemW, itemH, item, color, c, active, 8);
    });
    if (hideAppendingItem) {
      drawAppendingDeleteTsItem(x, y, itemW, itemH, gapX, rowGap, columns, rows, lane, c);
    }
    if (items.length > columns * rows) {
      ctx.fillStyle = c.muted;
      ctx.font = typeFont(TYPE.text, 800);
      ctx.textAlign = 'right';
      ctx.fillText(`+${items.length - columns * rows}`, x + w, y + rows * itemH + rowGap);
    }
  }

  function foldEligibleHighlightReady() {
    if (currentStep().anim === 'foldDeleteTs') return true;
    if (activeReplayLane().highlight !== 'foldEligible') return true;
    return stepProgress() >= .72;
  }

  function queryDeleteTsHighlightReady() {
    const st = currentStep();
    if (state.scene !== 'query') return false;
    if (st.anim === 'queryBitmapFold') return true;
    if (st.anim !== 'queryBitmapCheck') return false;
    return stepProgress() >= .50;
  }

  function drawFoldingDeleteTsItems(chainX, chainY, chainW, bitmapX, bitmapY, bitmapW, lane, c) {
    if (currentStep().anim !== 'foldDeleteTs') return;
    const p = stepProgress();
    if (p >= .82) return;
    const t = ease(clamp((p - .08) / .70, 0, 1));
    const layout = deleteTsItemLayout(chainW);
    const items = (lane.prevDeleteTs || []).slice(0, layout.columns * layout.rows);
    items.forEach((item, i) => {
      if (lane.safeTs == null || deleteTsValue(item) > lane.safeTs) return;
      const offset = foldBitmapOffsetValue(item, lane);
      if (!Number.isFinite(offset)) return;
      const start = deleteTsItemCenter(chainX, chainY, layout, i);
      const target = bitmapCellCenter(bitmapX, bitmapY, bitmapW, offset);
      const cx = lerp(start.x, target.x, t);
      const cy = lerp(start.y, target.y, t);
